<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gösterge Paneli — Öğrenci Bilgi Sistemi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row">
          <div class="col-sm-6">
            <h3 class="mb-0">Gösterge Paneli</h3>
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item active">Ana Sayfa</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <!-- Özet Kartlar -->
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="card text-white bg-primary h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-people-fill fs-2 opacity-75"></i>
                <div>
                  <div class="small">Toplam Öğrenci</div>
                  <div class="fs-4 fw-bold" id="kart-toplam">—</div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-white bg-info h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-gender-ambiguous fs-2 opacity-75"></i>
                <div>
                  <div class="small">Kız / Erkek</div>
                  <div class="fs-4 fw-bold" id="kart-kizerkek">—</div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-white bg-success h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-house-fill fs-2 opacity-75"></i>
                <div>
                  <div class="small">Yatılı</div>
                  <div class="fs-4 fw-bold" id="kart-yatili">—</div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-white bg-warning h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-exclamation-triangle-fill fs-2 opacity-75"></i>
                <div>
                  <div class="small">Devamsızlık Uyarısı</div>
                  <div class="fs-4 fw-bold" id="kart-uyari">—</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3">

          <!-- Devamsızlık Uyarı Listesi -->
          <div class="col-12 col-lg-6">
            <div class="card h-100">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0"><i class="bi bi-exclamation-circle text-warning me-1"></i> Devamsızlık Uyarıları</h6>
                <a href="attendance-report.html" class="btn btn-sm btn-outline-secondary">Tümü</a>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-sm table-hover mb-0">
                    <thead class="table-light">
                      <tr>
                        <th>Öğrenci</th>
                        <th>Sınıf</th>
                        <th class="text-center">Özürsüz</th>
                        <th class="text-center">Özürlü</th>
                        <th class="text-center">Durum</th>
                      </tr>
                    </thead>
                    <tbody id="devamsizlik-tablo">
                      <tr><td colspan="5" class="text-center text-muted py-3">Yükleniyor...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <!-- Sınıf Dağılımı Grafik -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
              <div class="card-header">
                <h6 class="mb-0"><i class="bi bi-pie-chart me-1"></i> Sınıf Dağılımı</h6>
              </div>
              <div class="card-body d-flex align-items-center justify-content-center">
                <canvas id="sinif-grafik" width="220" height="220"></canvas>
              </div>
            </div>
          </div>

          <!-- Son Davranış Kayıtları -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0"><i class="bi bi-star-half me-1"></i> Son Davranışlar</h6>
                <a href="behavior-report.html" class="btn btn-sm btn-outline-secondary">Tümü</a>
              </div>
              <div class="card-body p-0">
                <ul class="list-group list-group-flush" id="davranis-liste">
                  <li class="list-group-item text-muted text-center">Yükleniyor...</li>
                </ul>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>
</div>

<!-- Bottom Nav (Telefon) -->
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
  import { requireAuth } from "auth.js";
  import { layoutYukle } from "layout.js";
  import { db } from "firebase-config.js";
  import {
    collection, getDocs, query, where, orderBy, limit
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { devamsizlikDurum, formatTamAd } from "utils.js";

  requireAuth(async () => {
    layoutYukle();
    await yukleVeriler();
  });

  async function yukleVeriler() {
    try {
      const ogrSnap = await getDocs(
        query(collection(db, "students"), where("durum", "==", "Aktif"))
      );

      let toplam = 0, kiz = 0, erkek = 0, yatili = 0;
      const sinifSayac = {};
      const ogrenciler = [];

      ogrSnap.forEach(doc => {
        const o = doc.data();
        toplam++;
        if (o.cinsiyet === "Kız") kiz++; else erkek++;
        if (o.yatililik && o.yatililik !== "Gündüzlü") yatili++;
        sinifSayac[o.sinif] = (sinifSayac[o.sinif] || 0) + 1;
        ogrenciler.push({ id: doc.id, ...o });
      });

      document.getElementById("kart-toplam").textContent = toplam;
      document.getElementById("kart-kizerkek").textContent = `${kiz} / ${erkek}`;
      document.getElementById("kart-yatili").textContent = yatili;

      await yukleDevamsizlikUyarilari(ogrenciler);
      yukleGrafik(sinifSayac);
      await yukleSonDavranislar();

    } catch (err) {
      console.error("Dashboard verisi yüklenemedi:", err);
    }
  }

  async function yukleDevamsizlikUyarilari(ogrenciler) {
    const tablo = document.getElementById("devamsizlik-tablo");
    const uyarilar = [];

    for (const ogr of ogrenciler) {
      const devSnap = await getDocs(collection(db, "students", ogr.id, "devamsizliklar"));
      let ozurlu = 0, ozursuz = 0;
      devSnap.forEach(d => {
        const v = d.data();
        if (v.tur === "Özürlü") ozurlu += v.gun_degeri || 0;
        else ozursuz += v.gun_degeri || 0;
      });
      const durum = devamsizlikDurum(ozurlu, ozursuz);
      if (durum !== "normal") {
        uyarilar.push({ ogr, ozurlu, ozursuz, durum });
      }
    }

    document.getElementById("kart-uyari").textContent = uyarilar.length;

    if (uyarilar.length === 0) {
      tablo.innerHTML = `<tr><td colspan="5" class="text-center text-success py-3">
        <i class="bi bi-check-circle me-1"></i> Uyarı yok</td></tr>`;
      return;
    }

    uyarilar.sort((a, b) => (b.ozursuz + b.ozurlu) - (a.ozursuz + a.ozurlu));

    tablo.innerHTML = uyarilar.map(({ ogr, ozurlu, ozursuz, durum }) => {
      const renk = durum === "kritik" ? "danger" : "warning";
      const tam = `${ogr.ad || ""} ${ogr.soyad || ""}`.trim();
      return `<tr>
        <td><a href="students-detail.html?id=${ogr.id}" class="text-decoration-none">${tam}</a></td>
        <td>${ogr.sinif || "—"}</td>
        <td class="text-center">${ozursuz}</td>
        <td class="text-center">${ozurlu}</td>
        <td class="text-center"><span class="badge bg-${renk}">${durum === "kritik" ? "Kritik" : "Uyarı"}</span></td>
      </tr>`;
    }).join("");
  }

  function yukleGrafik(sinifSayac) {
    const etiketler = Object.keys(sinifSayac).sort();
    const veriler = etiketler.map(s => sinifSayac[s]);
    const renkler = [
      "#0d6efd","#6610f2","#6f42c1","#d63384","#dc3545",
      "#fd7e14","#ffc107","#198754","#20c997","#0dcaf0"
    ];

    new Chart(document.getElementById("sinif-grafik"), {
      type: "doughnut",
      data: {
        labels: etiketler,
        datasets: [{ data: veriler, backgroundColor: renkler.slice(0, etiketler.length) }]
      },
      options: {
        plugins: { legend: { position: "bottom", labels: { font: { size: 11 } } } },
        cutout: "60%"
      }
    });
  }

  async function yukleSonDavranislar() {
    const liste = document.getElementById("davranis-liste");
    const tümDavranislar = [];

    const ogrSnap = await getDocs(
      query(collection(db, "students"), where("durum", "==", "Aktif"), limit(50))
    );

    const promises = [];
    ogrSnap.forEach(doc => {
      const ogr = doc.data();
      const p = getDocs(
        query(collection(db, "students", doc.id, "davranislar"), orderBy("tarih", "desc"), limit(3))
      ).then(snap => {
        snap.forEach(d => {
          tümDavranislar.push({ ...d.data(), ogrAd: `${ogr.ad || ""} ${ogr.soyad || ""}`.trim(), ogrId: doc.id });
        });
      });
      promises.push(p);
    });

    await Promise.all(promises);

    tümDavranislar.sort((a, b) => b.tarih?.localeCompare?.(a.tarih) || 0);
    const son10 = tümDavranislar.slice(0, 10);

    if (son10.length === 0) {
      liste.innerHTML = `<li class="list-group-item text-muted text-center">Kayıt yok</li>`;
      return;
    }

    liste.innerHTML = son10.map(d => {
      const renk = d.tur === "Olumlu" ? "success" : "danger";
      const ikon = d.tur === "Olumlu" ? "bi-hand-thumbs-up" : "bi-hand-thumbs-down";
      return `<li class="list-group-item px-3 py-2">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <i class="bi ${ikon} text-${renk} me-1"></i>
            <small class="fw-semibold">${d.ogrAd}</small>
            <div class="text-muted" style="font-size:.78rem">${d.kategori || ""}</div>
          </div>
          <small class="text-muted">${d.tarih || ""}</small>
        </div>
      </li>`;
    }).join("");
  }
</script>
</body>
</html>
