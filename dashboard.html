<div class="app-wrapper">

  <main class="app-main">

      <div class="container-fluid">

            </ol>
          </div>

        <!-- Özet Kartlar -->
        <div class="row g-3 mb-4">

            <div class="card text-white bg-primary dashboard-summary-card h-100">

              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-house-fill fs-2 opacity-75"></i>
                <div>
                  <div class="small">Gündüzlü / Yatılı</div>
                  <div class="fs-5 fw-bold lh-sm">

                    <span class="fs-6 fw-semibold opacity-75" id="kart-yatili-detay"></span>

                </div>

          </div>

            <div class="card text-white bg-warning dashboard-summary-card h-100">
              <div class="card-body d-flex align-items-center gap-3">
                <i class="bi bi-exclamation-triangle-fill fs-2 opacity-75"></i>
                <div>
                  <div class="small">Devamsızlık Uyarısı</div>
                  <div class="fs-4 fw-bold" id="kart-uyari">—</div>
                </div>
              </div>

        <!-- Hızlı Öğrenci İşlemleri -->
        <div class="card mb-4 no-print" id="ogrenci-ara">

                </div>

                </div>
              </div>

                  <button type="button" class="btn btn-sm btn-outline-dark hizli-islem-btn" id="btn-ogr-goruntule" disabled>
                    <i class="bi bi-eye me-1"></i>Görüntüle
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-primary hizli-islem-btn" id="btn-devamsizlik-ekle" data-admin-only disabled>
                    <i class="bi bi-calendar-plus me-1"></i>Devamsızlık Ekle
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-success hizli-islem-btn" id="btn-davranis-ekle" data-admin-only disabled>
                    <i class="bi bi-star me-1"></i>Davranış Ekle

                    <i class="bi bi-chat-dots me-1"></i>Görüşme Ekle

                  <button type="button" class="btn btn-sm btn-outline-secondary hizli-islem-btn" id="btn-ogr-duzenle" data-admin-only disabled>
                    <i class="bi bi-pencil me-1"></i>Düzenle
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger hizli-islem-btn" id="btn-ogr-sil" data-admin-only disabled>
                    <i class="bi bi-trash me-1"></i>Sil

        <div class="row g-3">

          <!-- Devamsızlık Uyarı Listesi -->

            <div class="card h-100">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0"><i class="bi bi-exclamation-circle text-warning me-1"></i> Devamsızlık Uyarıları</h6>
                <a href="attendance-report.html" class="btn btn-sm btn-outline-secondary">Tümü</a>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-sm table-hover mb-0">
                    <thead class="table-light">
                      <tr>
                        <th>Öğrenci</th>
                        <th>Sınıf</th>
                        <th class="text-center">Özürsüz</th>
                        <th class="text-center">Özürlü</th>
                        <th class="text-center">Durum</th>
                      </tr>
                    </thead>
                    <tbody id="devamsizlik-tablo">
                      <tr><td colspan="5" class="text-center text-muted py-3">Veriler hazırlanıyor...</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <!-- Son Davranış Kayıtları -->
          <div class="col-12 col-lg-6">
            <div class="card h-100">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0"><i class="bi bi-star-half me-1"></i> Son Davranışlar</h6>
                <a href="behavior-report.html" class="btn btn-sm btn-outline-secondary">Tümü</a>
              </div>
              <div class="card-body p-0">
                <ul class="list-group list-group-flush" id="davranis-liste">
                  <li class="list-group-item text-muted text-center">Veriler hazırlanıyor...</li>
                </ul>

          </div>

        </div>
      </div>
    </div>
  </main>
</div>

<!-- Bottom Nav (Telefon) -->
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>

<script type="module">
  import { requireAuth, adminActionAllowed } from "./auth.js?v=20260529-29";
  import { layoutYukle } from "./layout.js?v=20260529-29";
  import {
    tumOgrencileriGetir,
    tumDevamsizliklariGetir, tumDavranislariGetir, ogrenciSil
  } from "./students.js?v=20260529-29";
  import {
    devamsizlikDurum, devamsizlikGunDegeri,
    compareSinif, compareOgrenciNo, compareTarihDesc,
    sayiEtiketiTR, toast, onayIste, escapeHtml, escapeAttr
  } from "./utils.js?v=20260529-29";

  let tumOgrenciler = [];
  let seciliOgrenci = null;
  const DASHBOARD_CACHE_KEY = "obs-dashboard-cache-v3";
  const DASHBOARD_CACHE_TTL = 5 * 60 * 1000;

  requireAuth(async () => {
    layoutYukle();
    baglayici();
    await yukleVeriler();
  });

  async function yukleVeriler() {
    const cacheUygulandi = dashboardCacheUygula(dashboardCacheOku());

    try {
      const ogrenciler = await tumOgrencileriGetir();
      const ozet = ogrenciOzetHazirla(ogrenciler);
      tumOgrencileriAyarla(ozet.ogrenciler);
      dashboardOzetGoster(ozet);
      if (!cacheUygulandi) kayitPanelleriniHazirla();

      const [devamsizliklar, davranislar] = await Promise.all([
        tumDevamsizliklariGetir(),
        tumDavranislariGetir()
      ]);
      yukleDevamsizlikUyarilari(ozet.ogrenciler, devamsizliklar);
      yukleSonDavranislar(ozet.ogrenciler, davranislar);
      dashboardCacheYaz(ozet);

    } catch (err) {
      if (!cacheUygulandi) dashboardBosDurum(err.message);
      else toast("Güncel veriler alınamadı, son kaydedilen görünüm gösteriliyor.", "warning");
    }
  }

  function ogrenciOzetHazirla(ogrencilerKaynak) {
    let toplam = 0, kiz = 0, erkek = 0, gunduzlu = 0, parali = 0, parasiz = 0;
    const ogrenciler = [];

    ogrencilerKaynak.forEach(kayit => {
      const o = { ...kayit };
      toplam++;
      if (o.cinsiyet === "Kız") kiz++;
      if (o.cinsiyet === "Erkek") erkek++;
      if (o.yatililik === "Paralı Yatılı") parali++;
      else if (o.yatililik === "Parasız Yatılı") parasiz++;
      else gunduzlu++;
      ogrenciler.push(o);
    });
    ogrenciler.sort((a, b) => compareSinif(a.sinif, b.sinif) || compareOgrenciNo(a, b));
    return { toplam, kiz, erkek, gunduzlu, parali, parasiz, ogrenciler };
  }

  function tumOgrencileriAyarla(ogrenciler) {
    tumOgrenciler = ogrenciler;
    if (seciliOgrenci && !tumOgrenciler.some(o => o.id === seciliOgrenci.id)) {
      ogrenciSeciminiTemizle();
    }
  }

  function dashboardOzetGoster({ toplam = 0, kiz = 0, erkek = 0, gunduzlu = 0, parali = 0, parasiz = 0 }) {
    document.getElementById("kart-toplam").textContent = toplam;
    document.getElementById("kart-toplam-detay").textContent = `(${kiz} Kız, ${erkek} Erkek)`;
    document.getElementById("kart-yatili").textContent = `${gunduzlu} / ${parali + parasiz}`;
    document.getElementById("kart-yatili-detay").textContent = `(${parali} Paralı / ${parasiz} Parasız Yatılı)`;
  }

  function kayitPanelleriniHazirla() {
    document.getElementById("devamsizlik-tablo").innerHTML =
      `<tr><td colspan="5" class="text-center text-muted py-3">Veriler hazırlanıyor...</td></tr>`;
    document.getElementById("davranis-liste").innerHTML =
      `<li class="list-group-item text-muted text-center">Veriler hazırlanıyor...</li>`;
  }

  function dashboardCacheOku() {
    try {
      const raw = localStorage.getItem(DASHBOARD_CACHE_KEY);
      if (!raw) return null;
      const cache = JSON.parse(raw);
      if (!cache?.zaman || Date.now() - cache.zaman > DASHBOARD_CACHE_TTL) return null;
      return cache;
    } catch {
      return null;
    }
  }

  function dashboardCacheUygula(cache) {
    if (!cache) return false;
    if (Array.isArray(cache.ogrenciler)) tumOgrencileriAyarla(cache.ogrenciler);
    if (cache.ozet) dashboardOzetGoster(cache.ozet);
    if (cache.kartUyari !== undefined) document.getElementById("kart-uyari").textContent = cache.kartUyari;
    if (cache.devamsizlikHtml) document.getElementById("devamsizlik-tablo").innerHTML = cache.devamsizlikHtml;
    if (cache.davranisHtml) document.getElementById("davranis-liste").innerHTML = cache.davranisHtml;
    return true;
  }

  function dashboardCacheYaz(ozet) {
    try {
      const { ogrenciler: cacheDisi, ...ozetSayilar } = ozet;
      localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify({
        zaman: Date.now(),
        ozet: ozetSayilar,
        ogrenciler: tumOgrenciler.map(ogrenciCacheOzet),
        kartUyari: document.getElementById("kart-uyari").textContent,
        devamsizlikHtml: document.getElementById("devamsizlik-tablo").innerHTML,
        davranisHtml: document.getElementById("davranis-liste").innerHTML
      }));
    } catch {
      // Tarayıcı depolaması doluysa yalnızca anlık ekranla devam edilir.
    }
  }

  function ogrenciCacheOzet(o) {
    return {
      id: o.id,
      ad: o.ad || "",
      soyad: o.soyad || "",
      sinif: o.sinif || "",
      numara: o.numara || o.id || ""
    };
  }

  function dashboardBosDurum(mesaj) {
    tumOgrenciler = [];
    ogrenciSeciminiTemizle();
    document.getElementById("kart-toplam").textContent = "0";
    document.getElementById("kart-toplam-detay").textContent = "(0 Kız, 0 Erkek)";
    document.getElementById("kart-yatili").textContent = "0 / 0";
    document.getElementById("kart-yatili-detay").textContent = "(0 Paralı / 0 Parasız Yatılı)";
    document.getElementById("kart-uyari").textContent = "0";
    document.getElementById("devamsizlik-tablo").innerHTML =
      `<tr><td colspan="5" class="text-center text-muted py-3">${escapeHtml(mesaj || "Veri bulunamadı.")}</td></tr>`;
    document.getElementById("davranis-liste").innerHTML =
      `<li class="list-group-item text-muted text-center">Kayıt yok</li>`;
  }

  function yukleDevamsizlikUyarilari(ogrenciler, devamsizliklar) {
    const tablo = document.getElementById("devamsizlik-tablo");
    const ogrById = new Map(ogrenciler.map(ogr => [ogr.id, ogr]));
    const toplamlar = new Map();

    devamsizliklar.forEach(k => {
      if (!ogrById.has(k.ogrenciId)) return;
      const mevcut = toplamlar.get(k.ogrenciId) || { ozurlu: 0, ozursuz: 0 };
      const gun = devamsizlikGunDegeri(k);
      if (k.tur === "Özürlü") mevcut.ozurlu += gun;
      else mevcut.ozursuz += gun;
      toplamlar.set(k.ogrenciId, mevcut);
    });

    const uyarilar = [];

    for (const [ogrenciId, { ozurlu, ozursuz }] of toplamlar) {
      const ogr = ogrById.get(ogrenciId);
      const durum = devamsizlikDurum(ozurlu, ozursuz);
      if (durum !== "normal") {
        uyarilar.push({ ogr, ozurlu, ozursuz, durum });
      }
    }

    document.getElementById("kart-uyari").textContent = uyarilar.length;

    if (uyarilar.length === 0) {
      tablo.innerHTML = `<tr><td colspan="5" class="text-center text-success py-3">
        <i class="bi bi-check-circle me-1"></i> Uyarı yok</td></tr>`;
      return;
    }

    uyarilar.sort((a, b) =>
      riskPuani(b) - riskPuani(a)
      || compareSinif(a.ogr.sinif, b.ogr.sinif)
      || compareOgrenciNo(a.ogr, b.ogr)
    );

    tablo.innerHTML = uyarilar.slice(0, 5).map(({ ogr, ozurlu, ozursuz, durum }) => {
      const renk = devamsizlikDurumRenk(durum);
      const tam = `${ogr.ad || ""} ${ogr.soyad || ""}`.trim();
      return `<tr>
        <td><a href="students-detail.html?id=${escapeAttr(ogr.id)}" class="text-decoration-none">${escapeHtml(tam)}</a></td>
        <td>${escapeHtml(ogr.sinif || "—")}</td>
        <td class="text-center">${sayiEtiketiTR(ozursuz)}</td>
        <td class="text-center">${sayiEtiketiTR(ozurlu)}</td>
        <td class="text-center"><span class="badge bg-${renk}">${devamsizlikDurumEtiketi(durum)}</span></td>
      </tr>`;
    }).join("");
  }

  function riskPuani(kayit) {
    const durumKatsayi = kayit.durum === "kaldi" ? 2000 : kayit.durum === "kritik" ? 1000 : 0;
    return durumKatsayi + Math.max(
      kayit.ozursuz / 10,
      (kayit.ozurlu + kayit.ozursuz) / 30,
      kayit.ozurlu / 20
    ) * 100;
  }

  function devamsizlikDurumEtiketi(durum) {
    if (durum === "kaldi") return "Kaldı";
    if (durum === "kritik") return "Kritik";
    if (durum === "uyari") return "Uyarı";
    return "Normal";
  }

  function devamsizlikDurumRenk(durum) {
    if (durum === "kaldi") return "dark";
    if (durum === "kritik") return "danger";
    if (durum === "uyari") return "warning";
    return "success";
  }

  function yukleSonDavranislar(ogrenciler, davranislar) {
    const liste = document.getElementById("davranis-liste");
    const ogrById = new Map(ogrenciler.map(ogr => [ogr.id, ogr]));
    const tümDavranislar = davranislar
      .filter(d => ogrById.has(d.ogrenciId))
      .map(d => {
        const ogr = ogrById.get(d.ogrenciId);
        return { ...d, ogrAd: `${ogr.ad || ""} ${ogr.soyad || ""}`.trim(), ogrId: ogr.id };
      })
      .sort((a, b) => compareTarihDesc(a.tarih, b.tarih));
    const son5 = tümDavranislar.slice(0, 5);

    if (son5.length === 0) {
      liste.innerHTML = `<li class="list-group-item text-muted text-center">Kayıt yok</li>`;
      return;
    }

    liste.innerHTML = son5.map(d => {
      const renk = d.tur === "Olumlu" ? "success" : "danger";
      const ikon = d.tur === "Olumlu" ? "bi-hand-thumbs-up" : "bi-hand-thumbs-down";
      return `<li class="list-group-item px-3 py-2">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <i class="bi ${ikon} text-${renk} me-1"></i>
            <small class="fw-semibold">${escapeHtml(d.ogrAd)}</small>
            <div class="text-muted" style="font-size:.78rem">${escapeHtml(d.kategori || "")}</div>
          </div>
          <small class="text-muted">${escapeHtml(d.tarih || "")}</small>
        </div>
      </li>`;
    }).join("");
  }

  function baglayici() {
    const araEl = document.getElementById("hizli-ogr-ara");
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");

    araEl.addEventListener("input", aramaSonuclariGoster);
    araEl.addEventListener("focus", aramaSonuclariGoster);
    document.addEventListener("click", e => {
      if (!araEl.contains(e.target) && !sonucEl.contains(e.target)) sonucEl.classList.add("d-none");
    });

    document.getElementById("btn-ogr-goruntule").addEventListener("click", () => seciliOgrenciyeGit("students-detail.html"));
    document.getElementById("btn-devamsizlik-ekle").addEventListener("click", () => seciliOgrenciyeGit("attendance-entry.html"));
    document.getElementById("btn-davranis-ekle").addEventListener("click", () => seciliOgrenciyeGit("behavior-entry.html"));
    document.getElementById("btn-gorusme-ekle").addEventListener("click", () => seciliOgrenciyeGit("meetings-entry.html"));
    document.getElementById("btn-ogr-duzenle").addEventListener("click", () => seciliOgrenciyeGit("students-add-edit.html"));
    document.getElementById("btn-ogr-sil").addEventListener("click", seciliOgrenciSil);
    window.addEventListener("hashchange", ogrenciAramayaOdaklan);
    ogrenciAramayaOdaklan();
  }

  function ogrenciAramayaOdaklan() {
    if (location.hash !== "#ogrenci-ara") return;
    requestAnimationFrame(() => {
      const araEl = document.getElementById("hizli-ogr-ara");
      const kap = document.getElementById("ogrenci-ara");
      kap?.scrollIntoView({ behavior: "smooth", block: "center" });
      araEl?.focus();
      araEl?.select();
    });
  }

  function aramaSonuclariGoster() {
    const araEl = document.getElementById("hizli-ogr-ara");
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");
    const q = araEl.value.trim().toLocaleLowerCase("tr-TR");
    if (q.length < 2) {
      sonucEl.classList.add("d-none");
      return;
    }

    const eslesen = tumOgrenciler.filter(o => ogrenciAramaMetni(o).includes(q)).slice(0, 8);
    if (!eslesen.length) {
      sonucEl.innerHTML = `<div class="ac-item text-muted">Sonuç bulunamadı</div>`;
      sonucEl.classList.remove("d-none");
      return;
    }

    sonucEl.innerHTML = eslesen.map(o => `
      <div class="ac-item" data-id="${escapeAttr(o.id)}">
        <strong>${escapeHtml(ogrenciAd(o))}</strong>
        <span class="text-muted ms-2 small">${escapeHtml(o.sinif || "Sınıf yok")} · No: ${escapeHtml(o.numara || o.id)}</span>
      </div>
    `).join("");
    sonucEl.classList.remove("d-none");
    sonucEl.querySelectorAll(".ac-item[data-id]").forEach(el => {
      el.addEventListener("click", () => {
        const ogr = tumOgrenciler.find(o => o.id === el.dataset.id);
        if (ogr) ogrenciSec(ogr);
      });
    });
  }

  function ogrenciSec(ogr) {
    seciliOgrenci = ogr;
    document.getElementById("hizli-ogr-ara").value = ogrenciAd(ogr);
    document.getElementById("hizli-ogr-sonuclar").classList.add("d-none");
    document.getElementById("hizli-secili-ogrenci").innerHTML =
      `Seçili Öğrenci: <strong>${escapeHtml(ogrenciAd(ogr))}</strong> <span class="text-muted">(${escapeHtml(ogr.sinif || "Sınıf yok")} · No: ${escapeHtml(ogr.numara || ogr.id)})</span>`;
    islemButonlariniGuncelle();
  }

  function ogrenciSeciminiTemizle() {
    seciliOgrenci = null;
    const araEl = document.getElementById("hizli-ogr-ara");
    if (araEl) araEl.value = "";
    document.getElementById("hizli-ogr-sonuclar")?.classList.add("d-none");
    const seciliEl = document.getElementById("hizli-secili-ogrenci");
    if (seciliEl) seciliEl.textContent = "Seçili Öğrenci: —";
    islemButonlariniGuncelle();
  }

  function islemButonlariniGuncelle(zorlaPasif = false) {
    const pasif = zorlaPasif || !seciliOgrenci;
    document.querySelectorAll(".hizli-islem-btn").forEach(btn => { btn.disabled = pasif; });
  }

  function seciliOgrenciyeGit(sayfa) {
    if (!seciliOgrenci) {
      toast("Önce öğrenci seçin.", "warning");
      return;
    }
    if (sayfa !== "students-detail.html" && !adminActionAllowed()) return;
    location.href = `${sayfa}?id=${encodeURIComponent(seciliOgrenci.id)}`;
  }

  async function seciliOgrenciSil() {
    if (!seciliOgrenci) {
      toast("Önce öğrenci seçin.", "warning");
      return;
    }
    if (!adminActionAllowed()) return;

    const ogr = seciliOgrenci;
    const ad = ogrenciAd(ogr);
    const onay = await onayIste({
      baslik: "Öğrenciyi sil",
      mesaj: `${ad} ve öğrenciye bağlı tüm kayıtlar kalıcı olarak silinecek.`,
      detay: "Veli, devamsızlık, davranış ve veli görüşmesi kayıtları da silinir. Bu işlem geri alınamaz.",
      onayMetni: "SİL",
      onayButonu: "Sil",
      tip: "danger"
    });
    if (!onay) return;

    const silBtn = document.getElementById("btn-ogr-sil");
    const eskiHtml = silBtn.innerHTML;
    islemButonlariniGuncelle(true);
    silBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>Siliniyor...`;
    try {
      await ogrenciSil(ogr.id);
      toast("Öğrenci ve tüm bağlı kayıtları silindi.", "success");
      ogrenciSeciminiTemizle();
      await yukleVeriler();
    } catch (err) {
      toast("Öğrenci silinemedi: " + err.message, "danger");
      islemButonlariniGuncelle();
    } finally {
      silBtn.innerHTML = eskiHtml;
    }
  }

  function ogrenciAd(ogr) {
    return `${ogr?.ad || ""} ${ogr?.soyad || ""}`.trim() || ogr?.id || "";
  }

  function ogrenciAramaMetni(ogr) {
    return `${ogr.id || ""} ${ogr.numara || ""} ${ogr.ad || ""} ${ogr.soyad || ""} ${ogr.sinif || ""}`
      .toLocaleLowerCase("tr-TR");
  }
</script>
</body>
</html>
