<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"
        integrity="sha384-+4p7LDsv7qv4DpdBj3wITizBeFFK5pEwCMHKkmWRepY1L4SzbJD1DKvVWOlFvqMQ"
        crossorigin="anonymous"></script>

<script type="module">
  import { requireAuth } from "./auth.js?v=20260608-101";
  import { layoutYukle } from "./layout.js?v=20260608-101";
  import {
    tumOgrencileriGetir,
    tumDevamsizliklariGetir, tumDavranislariGetir
  } from "./students.js?v=20260608-101";
  import {
    devamsizlikDurum, devamsizlikDurumEtiketi, devamsizlikGunDegeri, devamsizlikRenk,
    compareSinif, compareOgrenciNo, compareTarihDesc,
    sayiEtiketiTR, toast, escapeHtml, escapeAttr
  } from "./utils.js?v=20260608-101";
  import { APP_VERSION } from "./version.js?v=20260608-101";

  let tumOgrenciler = [];
  let hizliAramaAktifIndex = -1;
  const DASHBOARD_CACHE_KEY = `obs-dashboard-cache-v4:${APP_VERSION}`;
  const DASHBOARD_CACHE_TTL = 5 * 60 * 1000;

  requireAuth(async () => {
    layoutYukle();
    baglayici();
    await yukleVeriler();
  });

  async function yukleVeriler() {
    const cacheUygulandi = dashboardCacheUygula(dashboardCacheOku());

    try {
      const ogrenciler = await tumOgrencileriGetir();
      const ozet = ogrenciOzetHazirla(ogrenciler);
      tumOgrencileriAyarla(ozet.ogrenciler);
      dagilimGoster(ozet, ozet.ogrenciler);
      dogumGunleriGoster(ozet.ogrenciler);
      if (!cacheUygulandi) kayitPanelleriniHazirla();

      const [devamsizliklar, davranislar] = await Promise.all([
        tumDevamsizliklariGetir(),
        tumDavranislariGetir()
      ]);
      yukleDevamsizlikUyarilari(ozet.ogrenciler, devamsizliklar);
      yukleSonDavranislar(ozet.ogrenciler, davranislar);
      dashboardCacheYaz(ozet);
    } catch (err) {
      if (!cacheUygulandi) dashboardBosDurum(err.message);
      else toast("Güncel veriler alınamadı, son kaydedilen görünüm gösteriliyor.", "warning");
    }
  }

  function ogrenciOzetHazirla(ogrencilerKaynak) {
    let toplam = 0, kiz = 0, erkek = 0, gunduzlu = 0, parali = 0, parasiz = 0;
    const ogrenciler = [];

    ogrencilerKaynak.forEach(kayit => {
      const o = { ...kayit };
      toplam++;
      if (o.cinsiyet === "Kız") kiz++;
      if (o.cinsiyet === "Erkek") erkek++;
      if (o.yatililik === "Paralı Yatılı") parali++;
      else if (o.yatililik === "Parasız Yatılı") parasiz++;
      else gunduzlu++;
      ogrenciler.push(o);
    });
    ogrenciler.sort((a, b) => compareSinif(a.sinif, b.sinif) || compareOgrenciNo(a, b));
    return { toplam, kiz, erkek, gunduzlu, parali, parasiz, ogrenciler };
  }

  function tumOgrencileriAyarla(ogrenciler) {
    tumOgrenciler = ogrenciler;
  }

  function setText(id, v) {
    const el = document.getElementById(id);
    if (el) el.textContent = v;
  }

  function dagilimGoster(sayilar, ogrenciler) {
    const { toplam = 0, kiz = 0, erkek = 0, gunduzlu = 0, parali = 0, parasiz = 0 } = sayilar || {};
    const toplamCinsiyet = (kiz + erkek) || 1;
    const kizYuzde = Math.round((kiz / toplamCinsiyet) * 100);
    const donut = document.getElementById("cinsiyet-donut");
    if (donut) donut.style.background =
      `conic-gradient(var(--obs-chart-girl) 0 ${kizYuzde}%, var(--obs-chart-boy) ${kizYuzde}% 100%)`;
    setText("donut-toplam", toplam);
    setText("lg-erkek", erkek);
    setText("lg-kiz", kiz);

    const yatililikDonut = document.getElementById("yatililik-donut");
    const toplamYatililik = gunduzlu + parali + parasiz;
    const legEl = document.getElementById("yatililik-legend");
    const segmentler = [
      { ad: "Gündüzlü",       deger: gunduzlu, sinif: "grafik-nokta-primary",   renk: "var(--obs-primary)" },
      { ad: "Parasız Yatılı", deger: parasiz,  sinif: "grafik-nokta-success",   renk: "var(--obs-success)" },
      { ad: "Paralı Yatılı",  deger: parali,   sinif: "grafik-nokta-secondary", renk: "var(--obs-secondary)" }
    ];
    if (yatililikDonut) {
      yatililikDonut.style.background = toplamYatililik
        ? donutGradient(segmentler)
        : "conic-gradient(var(--obs-border) 0 100%)";
    }
    setText("yatililik-toplam", toplamYatililik);
    if (legEl) legEl.innerHTML = segmentler.map(s => `
      <span>
        <i class="grafik-nokta ${s.sinif}"></i>${s.ad}
        <strong class="ms-1">${s.deger}</strong>
      </span>`).join("");

    const barEl = document.getElementById("sinif-barlar");
    if (!barEl) return;
    const sayim = new Map();
    (ogrenciler || []).forEach(o => {
      const s = o.sinif || "—";
      const mevcut = sayim.get(s) || { erkek: 0, kiz: 0 };
      if (o.cinsiyet === "Erkek") mevcut.erkek++;
      else if (o.cinsiyet === "Kız") mevcut.kiz++;
      sayim.set(s, mevcut);
    });
    const girisler = [...sayim.entries()].sort((a, b) => compareSinif(a[0], b[0]));
    const enYuksek = Math.max(1, ...girisler.map(([, s]) => s.erkek + s.kiz));
    const CHART_H = 120;
    barEl.innerHTML = girisler.length
      ? `<div class="sinif-barlar-kap">
          ${girisler.map(([sinif, s]) => {
            const toplamS = s.erkek + s.kiz;
            const erkekH = Math.round((s.erkek / enYuksek) * CHART_H);
            const kizH = Math.round((s.kiz / enYuksek) * CHART_H);
            return `
            <div class="sinif-bar-kolon">
              <span class="sinif-bar-toplam">${toplamS}</span>
              <div class="sinif-bar-yigin">
                ${s.erkek > 0 ? `<div title="Erkek: ${s.erkek}" class="sinif-bar-parca sinif-bar-parca-erkek" data-height="${erkekH}">
                  ${erkekH >= 16 ? `<span class="sinif-bar-deger">${s.erkek}</span>` : ""}
                </div>` : ""}
                ${s.kiz > 0 ? `<div title="Kız: ${s.kiz}" class="sinif-bar-parca sinif-bar-parca-kiz ${s.erkek === 0 ? "sinif-bar-parca-tek" : ""}" data-height="${kizH}">
                  ${kizH >= 16 ? `<span class="sinif-bar-deger">${s.kiz}</span>` : ""}
                </div>` : ""}
              </div>
              <span class="sinif-bar-etiket">${escapeHtml(sinif)}</span>
            </div>`;
          }).join("")}
        </div>`
      : `<div class="text-muted small">Kayıt yok</div>`;
    barEl.querySelectorAll(".sinif-bar-parca[data-height]").forEach(parca => {
      const height = Math.max(0, Math.min(CHART_H, Number(parca.dataset.height) || 0));
      parca.style.height = `${height}px`;
    });
  }

  function donutGradient(segmentler) {
    const toplam = segmentler.reduce((sum, s) => sum + Math.max(0, Number(s.deger) || 0), 0);
    if (!toplam) return "conic-gradient(var(--obs-border) 0 100%)";

    let baslangic = 0;
    const parcalar = segmentler
      .filter(s => s.deger > 0)
      .map(s => {
        const bitis = baslangic + (s.deger / toplam) * 100;
        const parca = `${s.renk} ${baslangic.toFixed(2)}% ${bitis.toFixed(2)}%`;
        baslangic = bitis;
        return parca;
      });
    return `conic-gradient(${parcalar.join(", ")})`;
  }

  function devamsizlikDurumOzetiGoster(ogrenciler, toplamlar) {
    const sayac = { normal: 0, uyari: 0, kritik: 0, kaldi: 0 };
    ogrenciler.forEach(o => {
      const t = toplamlar.get(o.id);
      const durum = t ? devamsizlikDurum(t.ozurlu, t.ozursuz) : "normal";
      sayac[durum] = (sayac[durum] || 0) + 1;
    });
    const kartlar = [
      { ad: "Normal", sayi: sayac.normal, renk: "success", ikon: "bi-check-circle" },
      { ad: "Uyarı", sayi: sayac.uyari, renk: "warning", ikon: "bi-exclamation-circle" },
      { ad: "Kritik", sayi: sayac.kritik, renk: "danger", ikon: "bi-exclamation-triangle" },
      { ad: "Kaldı", sayi: sayac.kaldi, renk: "dark", ikon: "bi-x-octagon" }
    ];
    const el = document.getElementById("devamsizlik-durum-ozet");
    if (el) el.innerHTML = kartlar.map(k => `
      <div class="col-6 col-xl-3">
        <div class="border rounded-3 p-2 text-center h-100">
          <i class="bi ${k.ikon} text-${k.renk} fs-5"></i>
          <div class="fs-4 fw-bold lh-1 mt-1">${k.sayi}</div>
          <div class="small text-muted">${k.ad}</div>
        </div>
      </div>`).join("");
  }

  function dogumGunleriGoster(ogrenciler) {
    const liste = document.getElementById("dogumgunu-liste");
    if (!liste) return;
    const bugunD = new Date();
    bugunD.setHours(0, 0, 0, 0);
    const bugunGun = bugunD.getDate();
    const bugunAy = bugunD.getMonth() + 1;
    const sonuc = [];
    (ogrenciler || []).forEach(o => {
      const m = String(o.dogum_tarihi || "").trim().match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/);
      if (!m) return;
      const g = Number(m[1]), a = Number(m[2]), y = Number(m[3]);
      if (g !== bugunGun || a !== bugunAy) return;
      const yas = bugunD.getFullYear() - y;
      sonuc.push({
        o,
        tarih: `${String(g).padStart(2, "0")}.${String(a).padStart(2, "0")}`,
        yas
      });
    });
    sonuc.sort((a, b) => compareOgrenciNo(a.o, b.o));
    liste.innerHTML = sonuc.length
      ? sonuc.map(s => `
        <li class="list-group-item d-flex align-items-center justify-content-between">
          <a href="students-detail.html?id=${escapeAttr(s.o.id)}" class="text-decoration-none">
            <span class="fw-semibold">${escapeHtml(`${s.o.ad || ""} ${s.o.soyad || ""}`.trim())}</span>
            <span class="text-muted small ms-1">${escapeHtml(s.o.sinif || "")}</span>
          </a>
          <span class="text-end">
            <span class="badge bg-secondary">Bugün</span>
            <div class="small text-muted">${s.tarih}${s.yas > 0 ? ` · ${s.yas} yaş` : ""}</div>
          </span>
        </li>`).join("")
      : `<li class="list-group-item text-muted text-center py-4"><i class="bi bi-cake2 d-block fs-3 mb-2 obs-icon-secondary"></i>Bugün doğum günü yok</li>`;
  }

  function kayitPanelleriniHazirla() {
    document.getElementById("devamsizlik-tablo").innerHTML =
      `<tr><td colspan="5" class="text-center text-muted py-3">Veriler hazırlanıyor...</td></tr>`;
    document.getElementById("davranis-liste").innerHTML =
      `<li class="list-group-item text-muted text-center">Veriler hazırlanıyor...</li>`;
  }

  function dashboardCacheOku() {
    try {
      const raw = sessionStorage.getItem(DASHBOARD_CACHE_KEY);
      if (!raw) return null;
      const cache = JSON.parse(raw);
      if (!cache?.zaman || Date.now() - cache.zaman > DASHBOARD_CACHE_TTL) return null;
      return cache;
    } catch {
      return null;
    }
  }

  function dashboardCacheUygula(cache) {
    if (!cache) return false;
    if (Array.isArray(cache.ogrenciler)) tumOgrencileriAyarla(cache.ogrenciler);
    if (cache.ozet) dagilimGoster(cache.ozet, tumOgrenciler);
    dogumGunleriGoster(tumOgrenciler);
    if (cache.devamsizlikHtml) document.getElementById("devamsizlik-tablo").innerHTML = cache.devamsizlikHtml;
    if (cache.davranisHtml) document.getElementById("davranis-liste").innerHTML = cache.davranisHtml;
    return true;
  }

  function dashboardCacheYaz(ozet) {
    try {
      const { ogrenciler: cacheDisi, ...ozetSayilar } = ozet;
      sessionStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify({
        zaman: Date.now(),
        ozet: ozetSayilar,
        ogrenciler: tumOgrenciler.map(ogrenciCacheOzet),
        devamsizlikHtml: document.getElementById("devamsizlik-tablo").innerHTML,
        davranisHtml: document.getElementById("davranis-liste").innerHTML
      }));
    } catch {
      // Tarayıcı depolaması doluysa yalnızca anlık ekranla devam edilir.
    }
  }

  function ogrenciCacheOzet(o) {
    return {
      id: o.id,
      ad: o.ad || "",
      soyad: o.soyad || "",
      sinif: o.sinif || "",
      numara: o.numara || o.id || "",
      cinsiyet: o.cinsiyet || "",
      yatililik: o.yatililik || "",
      dogum_tarihi: o.dogum_tarihi || ""
    };
  }

  function dashboardBosDurum(mesaj) {
    tumOgrenciler = [];
    hizliAramaKapat();
    document.getElementById("devamsizlik-tablo").innerHTML =
      `<tr><td colspan="5" class="text-center text-muted py-3">${escapeHtml(mesaj || "Veri bulunamadı.")}</td></tr>`;
    document.getElementById("davranis-liste").innerHTML =
      `<li class="list-group-item text-muted text-center">Kayıt yok</li>`;
  }

  function yukleDevamsizlikUyarilari(ogrenciler, devamsizliklar) {
    const tablo = document.getElementById("devamsizlik-tablo");
    const ogrById = new Map(ogrenciler.map(ogr => [ogr.id, ogr]));
    const toplamlar = new Map();

    devamsizliklar.forEach(k => {
      if (!ogrById.has(k.ogrenciId)) return;
      const mevcut = toplamlar.get(k.ogrenciId) || { ozurlu: 0, ozursuz: 0 };
      const gun = devamsizlikGunDegeri(k);
      if (k.tur === "Özürlü") mevcut.ozurlu += gun;
      else mevcut.ozursuz += gun;
      toplamlar.set(k.ogrenciId, mevcut);
    });

    devamsizlikDurumOzetiGoster(ogrenciler, toplamlar);

    const uyarilar = [];
    for (const [ogrenciId, { ozurlu, ozursuz }] of toplamlar) {
      const ogr = ogrById.get(ogrenciId);
      const durum = devamsizlikDurum(ozurlu, ozursuz);
      if (durum !== "normal") uyarilar.push({ ogr, ozurlu, ozursuz, durum });
    }

    if (uyarilar.length === 0) {
      tablo.innerHTML = `<tr><td colspan="5" class="text-center text-success py-3">
        <i class="bi bi-check-circle me-1"></i> Uyarı yok</td></tr>`;
      return;
    }

    uyarilar.sort((a, b) =>
      riskPuani(b) - riskPuani(a)
      || compareSinif(a.ogr.sinif, b.ogr.sinif)
      || compareOgrenciNo(a.ogr, b.ogr)
    );

    tablo.innerHTML = uyarilar.slice(0, 5).map(({ ogr, ozurlu, ozursuz, durum }) => {
      const renk = devamsizlikRenk(durum);
      const tam = `${ogr.ad || ""} ${ogr.soyad || ""}`.trim();
      return `<tr>
        <td><a href="students-detail.html?id=${escapeAttr(ogr.id)}" class="text-decoration-none">${escapeHtml(tam)}</a></td>
        <td>${escapeHtml(ogr.sinif || "—")}</td>
        <td class="text-center">${sayiEtiketiTR(ozursuz)}</td>
        <td class="text-center">${sayiEtiketiTR(ozurlu)}</td>
        <td class="text-center"><span class="badge bg-${renk}">${devamsizlikDurumEtiketi(durum)}</span></td>
      </tr>`;
    }).join("");
  }

  function riskPuani(kayit) {
    const durumKatsayi = kayit.durum === "kaldi" ? 2000 : kayit.durum === "kritik" ? 1000 : 0;
    return durumKatsayi + Math.max(
      kayit.ozursuz / 10,
      (kayit.ozurlu + kayit.ozursuz) / 30,
      kayit.ozurlu / 20
    ) * 100;
  }

  function yukleSonDavranislar(ogrenciler, davranislar) {
    const liste = document.getElementById("davranis-liste");
    const ogrById = new Map(ogrenciler.map(ogr => [ogr.id, ogr]));
    const tümDavranislar = davranislar
      .filter(d => ogrById.has(d.ogrenciId))
      .map(d => {
        const ogr = ogrById.get(d.ogrenciId);
        return { ...d, ogrAd: `${ogr.ad || ""} ${ogr.soyad || ""}`.trim(), ogrId: ogr.id };
      })
      .sort((a, b) => compareTarihDesc(a.tarih, b.tarih));
    const son5 = tümDavranislar.slice(0, 5);

    if (son5.length === 0) {
      liste.innerHTML = `<li class="list-group-item text-muted text-center">Kayıt yok</li>`;
      return;
    }

    liste.innerHTML = son5.map(d => {
      const renk = d.tur === "Olumlu" ? "success" : "danger";
      const ikon = d.tur === "Olumlu" ? "bi-hand-thumbs-up" : "bi-hand-thumbs-down";
      return `<li class="list-group-item px-3 py-2">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <i class="bi ${ikon} text-${renk} me-1"></i>
            <small class="fw-semibold">${escapeHtml(d.ogrAd)}</small>
            <div class="text-muted davranis-kategori-mini">${escapeHtml(d.kategori || "")}</div>
          </div>
          <small class="text-muted">${escapeHtml(d.tarih || "")}</small>
        </div>
      </li>`;
    }).join("");
  }

  function baglayici() {
    const araEl = document.getElementById("hizli-ogr-ara");
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");

    araEl.addEventListener("input", aramaSonuclariGoster);
    araEl.addEventListener("focus", aramaSonuclariGoster);
    araEl.addEventListener("keydown", hizliAramaKlavye);
    document.addEventListener("click", e => {
      if (!araEl.contains(e.target) && !sonucEl.contains(e.target)) hizliAramaKapat();
    });

    window.addEventListener("hashchange", ogrenciAramayaOdaklan);
    ogrenciAramayaOdaklan();
  }

  function ogrenciAramayaOdaklan() {
    if (location.hash !== "#ogrenci-ara") return;
    requestAnimationFrame(() => {
      const araEl = document.getElementById("hizli-ogr-ara");
      const kap = document.getElementById("ogrenci-ara");
      kap?.scrollIntoView({ behavior: "smooth", block: "center" });
      araEl?.focus();
      araEl?.select();
    });
  }

  function aramaSonuclariGoster() {
    const araEl = document.getElementById("hizli-ogr-ara");
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");
    const q = araEl.value.trim().toLocaleLowerCase("tr-TR");
    if (q.length < 2) {
      hizliAramaKapat();
      return;
    }

    const eslesen = tumOgrenciler.filter(o => ogrenciAramaMetni(o).includes(q)).slice(0, 8);
    if (!eslesen.length) {
      sonucEl.innerHTML = `<div class="ga-bos" role="status">Sonuç bulunamadı</div>`;
      hizliAramaAc();
      return;
    }

    sonucEl.innerHTML = eslesen.map((o, i) => `
      <a class="ga-item ac-item" id="hizli-ogr-sonuc-${i}" role="option" aria-selected="false"
         href="students-detail.html?id=${encodeURIComponent(o.id)}" data-id="${escapeAttr(o.id)}">
        <i class="bi bi-person-circle text-muted"></i>
        <span class="flex-grow-1">
          <span class="ga-ad">${escapeHtml(ogrenciAd(o))}</span>
          <span class="ga-meta d-block">No: ${escapeHtml(o.numara || o.id)} · ${escapeHtml(o.sinif || "Sınıf yok")} · ${escapeHtml(o.cinsiyet || "")}</span>
        </span>
      </a>
    `).join("");
    hizliAramaAc();
  }

  function hizliAramaAc() {
    const araEl = document.getElementById("hizli-ogr-ara");
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");
    sonucEl?.classList.remove("d-none");
    araEl?.setAttribute("aria-expanded", "true");
    araEl?.removeAttribute("aria-activedescendant");
    hizliAramaAktifIndex = -1;
  }

  function hizliAramaKapat() {
    const araEl = document.getElementById("hizli-ogr-ara");
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");
    sonucEl?.classList.add("d-none");
    araEl?.setAttribute("aria-expanded", "false");
    araEl?.removeAttribute("aria-activedescendant");
    hizliAramaAktifIndex = -1;
  }

  function hizliAramaAktifSonucuGuncelle(items) {
    const araEl = document.getElementById("hizli-ogr-ara");
    items.forEach((item, i) => {
      const aktif = i === hizliAramaAktifIndex;
      item.classList.toggle("aktif", aktif);
      item.setAttribute("aria-selected", aktif ? "true" : "false");
    });
    if (items[hizliAramaAktifIndex]) araEl?.setAttribute("aria-activedescendant", items[hizliAramaAktifIndex].id);
    else araEl?.removeAttribute("aria-activedescendant");
  }

  function hizliAramaKlavye(e) {
    const sonucEl = document.getElementById("hizli-ogr-sonuclar");
    const items = [...(sonucEl?.querySelectorAll(".ga-item") || [])];
    if (e.key === "ArrowDown") {
      if (!items.length) return;
      e.preventDefault();
      hizliAramaAktifIndex = Math.min(hizliAramaAktifIndex + 1, items.length - 1);
    } else if (e.key === "ArrowUp") {
      if (!items.length) return;
      e.preventDefault();
      hizliAramaAktifIndex = Math.max(hizliAramaAktifIndex - 1, 0);
    } else if (e.key === "Enter") {
      if (!items[hizliAramaAktifIndex]) return;
      e.preventDefault();
      location.href = items[hizliAramaAktifIndex].href;
      return;
    } else if (e.key === "Escape") {
      hizliAramaKapat();
      return;
    } else {
      return;
    }
    hizliAramaAktifSonucuGuncelle(items);
    items[hizliAramaAktifIndex]?.scrollIntoView({ block: "nearest" });
  }

  function ogrenciAd(ogr) {
    return `${ogr?.ad || ""} ${ogr?.soyad || ""}`.trim() || ogr?.id || "";
  }

  function ogrenciAramaMetni(ogr) {
    return `${ogr.id || ""} ${ogr.numara || ""} ${ogr.ad || ""} ${ogr.soyad || ""} ${ogr.sinif || ""}`
      .toLocaleLowerCase("tr-TR");
  }
</script>
</body>
