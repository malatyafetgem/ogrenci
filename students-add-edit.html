<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest?v=20260531-33">
  <meta name="theme-color" content="#0d6efd">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Öğrenci Bilgileri">
  <link rel="apple-touch-icon" href="apple-touch-icon-180.png?v=20260531-33">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260531-33">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=20260531-33">
  <link rel="shortcut icon" href="favicon.ico?v=20260531-33">
  <script src="file-redirect.js?v=20260531-33"></script>
  <script src="pwa.js?v=20260531-33"></script>
  <title>Öğrenci Ekle / Düzenle</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="app.css?v=20260531-33">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6">
            <h3 class="mb-0" id="sayfa-baslik">Yeni Öğrenci</h3>
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item"><a href="students-list.html">Öğrenciler</a></li>
              <li class="breadcrumb-item active" id="breadcrumb-son">Yeni</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">
        <div id="yukleniyor" class="text-center py-5 text-muted d-none">
          <div class="spinner-border text-primary mb-3"></div>
        </div>

        <div class="card" id="form-kart">
          <div class="card-body">
            <div id="hata-mesaji" class="alert alert-danger d-none"></div>

            <p class="form-bolum-baslik">1. Kişisel Bilgiler</p>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Ad <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f-ad" autocomplete="off">
              </div>
              <div class="col-md-4">
                <label class="form-label">Soyad <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f-soyad" autocomplete="off">
              </div>
              <div class="col-md-4">
                <label class="form-label">Öğrenci No <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f-numara" inputmode="numeric"
                       placeholder="Sadece rakam" autocomplete="off">
                <div class="invalid-feedback" id="no-hata">Bu numara zaten kullanımda.</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Öğrenci Telefonu</label>
                <input type="text" class="form-control" id="f-telefon" inputmode="numeric" autocomplete="off">
              </div>
              <div class="col-md-3">
                <label class="form-label">Sınıf <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="f-sinif" list="sinif-list" autocomplete="off"
                       placeholder="Örn: 9-A">
                <datalist id="sinif-list"></datalist>
              </div>
              <div class="col-md-3">
                <label class="form-label">Cinsiyet</label>
                <select class="form-select" id="f-cinsiyet">
                  <option value="">Seçin</option>
                  <option>Erkek</option>
                  <option>Kız</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Yatılılık</label>
                <select class="form-select" id="f-yatililik">
                  <option value="">Seçin</option>
                  <option>Gündüzlü</option>
                  <option>Paralı Yatılı</option>
                  <option>Parasız Yatılı</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Maddi Durum</label>
                <select class="form-select" id="f-maddi-durum">
                  <option value="">Seçin</option>
                  <option>Düşük</option>
                  <option>Orta</option>
                  <option>İyi</option>
                  <option>Çok İyi</option>
                </select>
              </div>
              <div class="col-md-8">
                <label class="form-label">Geldiği Okulun Adı</label>
                <input type="text" class="form-control" id="f-geldigi-okul" autocomplete="off">
              </div>
              <div class="col-md-4">
                <label class="form-label">Avatar</label>
                <div class="mt-1">
                  <img id="foto-onizleme" class="ogrenci-avatar-buyuk" alt="">
                </div>
              </div>
            </div>

            <p class="form-bolum-baslik">2. Kimlik & Doğum</p>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">TC Kimlik No</label>
                <input type="text" class="form-control" id="f-tc" maxlength="11" inputmode="numeric">
              </div>
              <div class="col-md-4">
                <label class="form-label">Doğum Tarihi</label>
                <input type="text" class="form-control" id="f-dogum-tarihi" placeholder="GG.AA.YYYY">
              </div>
              <div class="col-md-4">
                <label class="form-label">Doğum Yeri</label>
                <input type="text" class="form-control" id="f-dogum-yeri" list="dogum-yeri-list" autocomplete="off">
                <datalist id="dogum-yeri-list"></datalist>
              </div>
            </div>

            <p class="form-bolum-baslik">3. Sağlık Bilgileri</p>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Hastalık</label>
                <input type="text" class="form-control" id="f-hastalik">
              </div>
              <div class="col-md-4">
                <label class="form-label">Engel</label>
                <input type="text" class="form-control" id="f-engel">
              </div>
              <div class="col-md-4">
                <label class="form-label">İlaç</label>
                <input type="text" class="form-control" id="f-ilac">
              </div>
            </div>

            <p class="form-bolum-baslik">4. Yetenekler</p>
            <div id="yetenekler-kap"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="yetenek-ekle-btn">
              <i class="bi bi-plus-circle me-1"></i>Yetenek Ekle
            </button>

            <p class="form-bolum-baslik">5. Aile Durumu</p>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Aile Durumu</label>
                <select class="form-select" id="f-aile-durum">
                  <option value="">Seçin</option>
                  <option>Anne-baba birlikte</option>
                  <option>Anne-baba ayrı</option>
                  <option>Anne vefat</option>
                  <option>Baba vefat</option>
                  <option>Anne ve baba vefat</option>
                  <option>Vasi yanında</option>
                  <option>Koruyucu aile yanında</option>
                  <option>Diğer</option>
                </select>
              </div>
            </div>

            <p class="form-bolum-baslik">6. Veliler</p>
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
              <div class="text-muted small">Öğrenciye bağlı veliler merkezi Veli Listesi'nde de görünür.</div>
              <button type="button" class="btn btn-sm btn-outline-primary" id="veli-ekle-btn">
                <i class="bi bi-person-plus me-1"></i>Veli Ekle
              </button>
            </div>
            <div class="row g-3" id="veli-listesi"></div>
            <div id="veli-bos" class="text-center text-muted border rounded py-3">Veli eklenmemiş.</div>

            <datalist id="il-list"></datalist>
            <datalist id="meslek-list"></datalist>
            <datalist id="meslek-grubu-list"></datalist>
            <datalist id="gorev-list"></datalist>
            <datalist id="kurum-list"></datalist>

            <div class="d-flex gap-2 justify-content-end mt-4">
              <a href="students-list.html" class="btn btn-secondary">Vazgeç</a>
              <button type="button" class="btn btn-primary" id="kaydet-btn">
                <span id="kaydet-metin">Kaydet</span>
                <span id="kaydet-yuklen" class="d-none">
                  <span class="spinner-border spinner-border-sm me-1"></span>Kaydediliyor...
                </span>
              </button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/tr.js"></script>

<script type="module">
  import { requireAdmin } from "./auth.js?v=20260531-33";
  import { layoutYukle } from "./layout.js?v=20260531-33";
  import {
    ogrenciGetir, ogrenciEkle, ogrenciGuncelle,
    velileriGetir, veliEkleGuncelle, veliSil, siniflarGetir, noMevcutMu
  } from "./students.js?v=20260531-33";
  import {
    formatAd, formatSoyad, formatMetin, formatTelefon, baglaFormat, toast,
    gecerliOgrenciNo, gecerliTc, onayIste, escapeHtml, escapeAttr
  } from "./utils.js?v=20260531-33";
  import { autocompleteYukle, autocompleteGuncelle } from "./autocomplete.js?v=20260531-33";
  import { avatarSrc } from "./avatar.js?v=20260531-33";

  const params = new URLSearchParams(location.search);
  const duzenlemeId = params.get("id");
  let mevcutOgr = null;
  let mevcutVeliler = [];
  let yetenekSayac = 0;
  let veliSayac = 0;

  const YAKINLIK_SECENEKLERI = [
    "Anne", "Baba", "Vasi", "Üvey Anne", "Üvey Baba",
    "Dede", "Nine", "Abi", "Abla", "Koruyucu Aile", "Diğer"
  ];
  const VELI_DURUMLARI = ["Aktif", "Vefat", "Ulaşılamıyor", "Velayeti Yok", "Aranmasın", "Pasif"];
  const CALISMA_DURUMLARI = ["Çalışıyor", "Çalışmıyor", "İşsiz / iş arıyor", "Emekli", "Ev hanımı", "Öğrenci", "Geçici çalışıyor", "Mevsimlik çalışıyor", "Serbest çalışıyor"];
  const MESLEK_GRUPLARI = ["Eğitim", "Sağlık", "Kamu", "Güvenlik", "Tarım / Hayvancılık", "Sanayi / Üretim", "İnşaat", "Ticaret / Esnaf", "Hizmet Sektörü", "Ulaşım / Taşımacılık", "Bilişim / Teknoloji", "Finans / Muhasebe", "Hukuk", "Serbest Meslek", "Diğer"];

  requireAdmin(async () => {
    layoutYukle();
    try {
      await ilkYukle();
    } catch (err) {
      document.getElementById("form-kart").innerHTML =
        `<div class="alert alert-danger m-3">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Veriler yüklenemedi. Bağlantınızı kontrol edip sayfayı yenileyin.
          <div class="small text-muted mt-1">${escapeHtml(err.message)}</div>
        </div>`;
      return;
    }
    baglaSabitFormatlar();
    baglaOlaylar();
    flatpickr("#f-dogum-tarihi", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });
    avatarGuncelle();
    veliBosDurumGuncelle();
  });

  async function ilkYukle() {
    await yukleAutocomplete();

    const siniflar = await siniflarGetir();
    datalistDoldur("sinif-list", siniflar);

    if (duzenlemeId) {
      document.getElementById("sayfa-baslik").textContent = "Öğrenci Düzenle";
      document.getElementById("breadcrumb-son").textContent = "Düzenle";
      mevcutOgr = await ogrenciGetir(duzenlemeId);
      if (!mevcutOgr) { location.href = "students-list.html"; return; }
      mevcutVeliler = await velileriGetir(duzenlemeId);
      formuDoldur(mevcutOgr, mevcutVeliler);
    }
  }

  async function yukleAutocomplete() {
    const [iller, meslekler, meslekGruplari, gorevler, kurumlar, dogumYerleri] = await Promise.all([
      autocompleteYukle("iller"),
      autocompleteYukle("meslekler"),
      autocompleteYukle("meslek_gruplari"),
      autocompleteYukle("gorevler"),
      autocompleteYukle("kurumlar"),
      autocompleteYukle("dogum_yerleri")
    ]);
    datalistDoldur("il-list", iller);
    datalistDoldur("meslek-list", meslekler);
    datalistDoldur("meslek-grubu-list", [...MESLEK_GRUPLARI, ...meslekGruplari]);
    datalistDoldur("gorev-list", gorevler);
    datalistDoldur("kurum-list", kurumlar);
    datalistDoldur("dogum-yeri-list", dogumYerleri);
  }

  function datalistDoldur(id, liste) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = [...new Set((liste || []).filter(Boolean))]
      .map(v => `<option value="${escapeAttr(v)}"></option>`)
      .join("");
  }

  function formuDoldur(ogr, veliler) {
    const g = id => document.getElementById(id);
    g("f-ad").value = ogr.ad || "";
    g("f-soyad").value = ogr.soyad || "";
    g("f-numara").value = ogr.numara || ogr.id || "";
    g("f-numara").disabled = true;
    g("f-telefon").value = ogr.telefon || "";
    g("f-sinif").value = ogr.sinif || "";
    g("f-cinsiyet").value = ogr.cinsiyet || "";
    g("f-yatililik").value = ogr.yatililik || "";
    g("f-maddi-durum").value = ogr.maddi_durum || "";
    g("f-geldigi-okul").value = ogr.geldigi_okul || "";
    g("f-tc").value = ogr.tc_kimlik || "";
    g("f-dogum-tarihi").value = ogr.dogum_tarihi || "";
    g("f-dogum-yeri").value = ogr.dogum_yeri || "";
    g("f-hastalik").value = ogr.hastalik || "";
    g("f-engel").value = ogr.engel || "";
    g("f-ilac").value = ogr.ilac || "";
    g("f-aile-durum").value = ogr.aile_durumu || "";

    avatarGuncelle();

    if (ogr.yetenekler) {
      ogr.yetenekler.forEach(y => yetenekEkle(y.tur, y.aciklama));
    }
    veliler.forEach(v => veliKartEkle(v));
  }

  function baglaSabitFormatlar() {
    baglaFormat(document.getElementById("f-ad"), "ad");
    baglaFormat(document.getElementById("f-soyad"), "soyad");
    baglaFormat(document.getElementById("f-telefon"), "telefon");
    ["f-dogum-yeri", "f-geldigi-okul", "f-hastalik", "f-engel", "f-ilac"].forEach(id => {
      baglaFormat(document.getElementById(id), "metin");
    });
  }

  function baglaOlaylar() {
    document.getElementById("yetenek-ekle-btn").addEventListener("click", () => yetenekEkle());
    document.getElementById("veli-ekle-btn").addEventListener("click", () => veliKartEkle());
    document.getElementById("f-cinsiyet").addEventListener("change", avatarGuncelle);
    document.getElementById("kaydet-btn").addEventListener("click", kaydet);
    document.getElementById("veli-listesi").addEventListener("click", veliKartTiklama);
  }

  function yetenekEkle(tur = "", aciklama = "") {
    const i = yetenekSayac++;
    const kap = document.getElementById("yetenekler-kap");
    const div = document.createElement("div");
    div.className = "yetenek-satir";
    div.id = `yetenek-${i}`;
    div.innerHTML = `
      <select class="form-select form-select-sm" style="width:140px" id="y-tur-${i}">
        <option>Sanat</option><option>Spor</option><option>Müzik</option><option>Diğer</option>
      </select>
      <input type="text" class="form-control form-control-sm" id="y-aciklama-${i}"
             placeholder="Açıklama" value="${escapeAttr(aciklama)}">
      <button type="button" class="btn btn-sm btn-outline-danger" data-yetenek-sil="${i}">
        <i class="bi bi-x"></i>
      </button>`;
    kap.appendChild(div);
    if (tur) document.getElementById(`y-tur-${i}`).value = tur;
    div.querySelector("[data-yetenek-sil]").addEventListener("click", () => div.remove());
  }

  function yetenekleriTopla() {
    const sonuc = [];
    document.querySelectorAll("[id^='yetenek-']").forEach(div => {
      const i = div.id.split("-")[1];
      const tur = document.getElementById(`y-tur-${i}`)?.value || "";
      const aciklama = document.getElementById(`y-aciklama-${i}`)?.value.trim() || "";
      if (aciklama) sonuc.push({ tur, aciklama });
    });
    return sonuc;
  }

  function veliKartEkle(veri = {}) {
    const localId = `veli-${veliSayac++}`;
    const v = veliNormalize(veri);
    const col = document.createElement("div");
    col.className = "col-12";
    col.dataset.veliCard = localId;
    col.dataset.veliId = v.id || "";
    col.innerHTML = `
      <div class="card h-100 veli-form-card">
        <div class="card-header d-flex align-items-center justify-content-between gap-2 flex-wrap">
          <div class="fw-semibold veli-kart-baslik">${veliKartBaslik(v)}</div>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" data-veli-pasif>
              <i class="bi bi-slash-circle me-1"></i>Pasifleştir
            </button>
            <button type="button" class="btn btn-sm btn-outline-danger" data-veli-sil>
              <i class="bi bi-trash me-1"></i>Sil
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Yakınlık</label>
              <select class="form-select" data-field="yakinlik">${selectOptions(YAKINLIK_SECENEKLERI, v.yakinlik, "Seçin")}</select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Durum</label>
              <select class="form-select" data-field="durum">${selectOptions(VELI_DURUMLARI, v.durum || "Aktif")}</select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Ad</label>
              <input type="text" class="form-control" data-field="ad" value="${escapeAttr(v.ad)}" autocomplete="off">
            </div>
            <div class="col-md-3">
              <label class="form-label">Soyad</label>
              <input type="text" class="form-control" data-field="soyad" value="${escapeAttr(v.soyad)}" autocomplete="off">
            </div>
            <div class="col-md-3">
              <label class="form-label">Telefon</label>
              <input type="text" class="form-control" data-field="telefon" value="${escapeAttr(v.telefon)}" inputmode="numeric">
            </div>
            <div class="col-md-3">
              <label class="form-label">E-Posta</label>
              <input type="email" class="form-control" data-field="e_posta" value="${escapeAttr(v.e_posta)}">
            </div>
            <div class="col-md-3">
              <label class="form-label">İletişim Sırası</label>
              <input type="number" class="form-control" data-field="iletisim_sirasi" value="${escapeAttr(v.iletisim_sirasi || "")}" min="0">
            </div>
            <div class="col-md-3">
              <label class="form-label">Çalışma Durumu</label>
              <select class="form-select" data-field="calisma_durumu">${selectOptions(CALISMA_DURUMLARI, v.calisma_durumu, "Seçin")}</select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Meslek Grubu / Sektör</label>
              <input type="text" class="form-control" data-field="meslek_grubu" value="${escapeAttr(v.meslek_grubu)}" list="meslek-grubu-list" autocomplete="off">
            </div>
            <div class="col-md-3">
              <label class="form-label">Meslek</label>
              <input type="text" class="form-control" data-field="meslek" value="${escapeAttr(v.meslek)}" list="meslek-list" autocomplete="off">
            </div>
            <div class="col-md-3">
              <label class="form-label">Görev / Unvan</label>
              <input type="text" class="form-control" data-field="gorev_unvan" value="${escapeAttr(v.gorev_unvan)}" list="gorev-list" autocomplete="off">
            </div>
            <div class="col-md-4">
              <label class="form-label">Kurum / İş Yeri</label>
              <input type="text" class="form-control" data-field="kurum" value="${escapeAttr(v.kurum)}" list="kurum-list" autocomplete="off">
            </div>
            <div class="col-md-4">
              <label class="form-label">İl</label>
              <input type="text" class="form-control" data-field="il" value="${escapeAttr(v.il)}" list="il-list" autocomplete="off">
            </div>
            <div class="col-md-4">
              <label class="form-label">İlçe</label>
              <input type="text" class="form-control" data-field="ilce" value="${escapeAttr(v.ilce)}" autocomplete="off">
            </div>
            <div class="col-md-8">
              <label class="form-label">Adres</label>
              <input type="text" class="form-control" data-field="adres" value="${escapeAttr(v.adres)}" autocomplete="off">
            </div>
            <div class="col-md-4">
              <label class="form-label">Notlar</label>
              <input type="text" class="form-control" data-field="notlar" value="${escapeAttr(v.notlar)}" autocomplete="off">
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" data-field="birincil" ${v.birincil ? "checked" : ""}>
                <label class="form-check-label">Birincil veli</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" data-field="acil_kisi" ${v.acil_kisi ? "checked" : ""}>
                <label class="form-check-label">Acil durumda aranacak kişi</label>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    document.getElementById("veli-listesi").appendChild(col);
    baglaVeliFormatlari(col);
    col.addEventListener("input", () => veliBaslikGuncelle(col));
    col.addEventListener("change", () => veliBaslikGuncelle(col));
    veliBosDurumGuncelle();
  }

  function veliNormalize(v) {
    return {
      id: v.id || "",
      yakinlik: v.yakinlik || "",
      durum: v.durum || "Aktif",
      ad: v.ad || "",
      soyad: v.soyad || "",
      birincil: !!v.birincil,
      acil_kisi: !!v.acil_kisi,
      iletisim_sirasi: v.iletisim_sirasi || "",
      telefon: v.telefon || "",
      e_posta: v.e_posta || "",
      il: v.il || "",
      ilce: v.ilce || "",
      adres: v.adres || "",
      calisma_durumu: v.calisma_durumu || "",
      meslek_grubu: v.meslek_grubu || "",
      meslek: v.meslek || "",
      gorev_unvan: v.gorev_unvan || "",
      kurum: v.kurum || "",
      notlar: v.notlar || ""
    };
  }

  function veliKartBaslik(v) {
    const ad = `${v.ad || ""} ${v.soyad || ""}`.trim();
    return escapeHtml([v.yakinlik || "Veli", ad].filter(Boolean).join(" - "));
  }

  function veliBaslikGuncelle(card) {
    const v = veliVerisiAl(card);
    card.querySelector(".veli-kart-baslik").innerHTML = veliKartBaslik(v);
  }

  function selectOptions(liste, secili = "", bosLabel = "") {
    const bos = bosLabel ? `<option value="">${escapeHtml(bosLabel)}</option>` : "";
    return bos + liste.map(item => `<option value="${escapeAttr(item)}" ${item === secili ? "selected" : ""}>${escapeHtml(item || bosLabel)}</option>`).join("");
  }

  function baglaVeliFormatlari(card) {
    const map = {
      ad: "ad",
      soyad: "soyad",
      telefon: "telefon",
      il: "metin",
      ilce: "metin",
      adres: "metin",
      calisma_durumu: "metin",
      meslek_grubu: "metin",
      meslek: "metin",
      gorev_unvan: "metin",
      kurum: "metin",
      notlar: "metin"
    };
    Object.entries(map).forEach(([field, tip]) => {
      const el = card.querySelector(`[data-field="${field}"]`);
      if (el) baglaFormat(el, tip);
    });
  }

  async function veliKartTiklama(e) {
    const card = e.target.closest("[data-veli-card]");
    if (!card) return;
    if (e.target.closest("[data-veli-pasif]")) {
      const durum = card.querySelector('[data-field="durum"]');
      if (durum) durum.value = "Pasif";
      veliBaslikGuncelle(card);
    }
    if (e.target.closest("[data-veli-sil]")) {
      const onay = await onayIste({
        baslik: "Veli kaydını sil",
        mesaj: "Bu veli kaydı kalıcı olarak silinecek.",
        detay: "Silmek yerine pasifleştirmek istiyorsanız önce Pasifleştir düğmesini kullanın.",
        onayButonu: "Sil",
        tip: "danger"
      });
      if (!onay) return;
      if (card.dataset.veliId) {
        card.dataset.silinecek = "1";
        card.classList.add("d-none");
      } else {
        card.remove();
      }
      veliBosDurumGuncelle();
    }
  }

  function veliBosDurumGuncelle() {
    const gorunenKart = [...document.querySelectorAll("[data-veli-card]")].some(card => card.dataset.silinecek !== "1");
    document.getElementById("veli-bos").classList.toggle("d-none", gorunenKart);
  }

  function velileriTopla() {
    const kaydedilecek = [];
    const silinecek = [];
    document.querySelectorAll("[data-veli-card]").forEach(card => {
      if (card.dataset.silinecek === "1") {
        if (card.dataset.veliId) silinecek.push(card.dataset.veliId);
        return;
      }
      const veri = veliVerisiAl(card);
      if (!veliDoluMu(veri)) return;
      kaydedilecek.push({ id: card.dataset.veliId || null, veri });
    });
    return { kaydedilecek, silinecek };
  }

  function veliVerisiAl(card) {
    const alan = field => card.querySelector(`[data-field="${field}"]`);
    const val = field => alan(field)?.value.trim() || "";
    return {
      yakinlik: val("yakinlik"),
      durum: val("durum") || "Aktif",
      ad: formatAd(val("ad")),
      soyad: formatSoyad(val("soyad")),
      birincil: !!alan("birincil")?.checked,
      acil_kisi: !!alan("acil_kisi")?.checked,
      iletisim_sirasi: Number(val("iletisim_sirasi")) || 0,
      telefon: formatTelefon(val("telefon")),
      e_posta: val("e_posta"),
      il: formatMetin(val("il")),
      ilce: formatMetin(val("ilce")),
      adres: formatMetin(val("adres")),
      calisma_durumu: val("calisma_durumu"),
      meslek_grubu: formatMetin(val("meslek_grubu")),
      meslek: formatMetin(val("meslek")),
      gorev_unvan: formatMetin(val("gorev_unvan")),
      kurum: formatMetin(val("kurum")),
      notlar: formatMetin(val("notlar"))
    };
  }

  function veliDoluMu(v) {
    return [
      v.ad, v.soyad, v.telefon, v.e_posta, v.il, v.ilce,
      v.adres, v.calisma_durumu, v.meslek_grubu, v.meslek, v.gorev_unvan,
      v.kurum, v.notlar
    ].some(Boolean) || (v.yakinlik && (v.birincil || v.acil_kisi || v.durum !== "Aktif"));
  }

  async function kaydet() {
    const g = id => document.getElementById(id).value.trim();
    const hataEl = document.getElementById("hata-mesaji");

    function gosterHata(mesaj, odakId = null) {
      hataEl.textContent = mesaj;
      hataEl.classList.remove("d-none");
      hataEl.scrollIntoView({ behavior: "smooth", block: "center" });
      if (odakId) document.getElementById(odakId).focus();
    }

    hataEl.classList.add("d-none");

    const ad = formatAd(g("f-ad"));
    const soyad = formatSoyad(g("f-soyad"));
    const numara = g("f-numara");
    const sinif = g("f-sinif");

    if (!ad || !soyad || !numara || !sinif) {
      gosterHata("Ad, soyad, öğrenci numarası ve sınıf zorunludur.");
      return;
    }
    if (!gecerliOgrenciNo(numara)) {
      gosterHata("Öğrenci numarası sadece rakamlardan oluşmalıdır.", "f-numara");
      return;
    }

    const tcKimlik = g("f-tc");
    if (!gecerliTc(tcKimlik)) {
      gosterHata("Geçersiz TC Kimlik No. Lütfen 11 haneli geçerli bir TC girin veya boş bırakın.", "f-tc");
      return;
    }

    if (!duzenlemeId) {
      const varMi = await noMevcutMu(numara);
      if (varMi) {
        document.getElementById("f-numara").classList.add("is-invalid");
        return;
      }
    }

    document.getElementById("kaydet-metin").classList.add("d-none");
    document.getElementById("kaydet-yuklen").classList.remove("d-none");
    document.getElementById("kaydet-btn").disabled = true;

    try {
      const verilecekId = duzenlemeId || numara;
      const aileDurumu = g("f-aile-durum");
      const ogrVeri = {
        ad, soyad,
        numara,
        telefon: formatTelefon(g("f-telefon")),
        sinif: g("f-sinif"),
        cinsiyet: g("f-cinsiyet"),
        yatililik: g("f-yatililik"),
        maddi_durum: g("f-maddi-durum"),
        geldigi_okul: formatMetin(g("f-geldigi-okul")),
        fotograf_url: "",
        tc_kimlik: g("f-tc"),
        dogum_tarihi: g("f-dogum-tarihi"),
        dogum_yeri: formatMetin(g("f-dogum-yeri")),
        hastalik: formatMetin(g("f-hastalik")),
        engel: formatMetin(g("f-engel")),
        ilac: formatMetin(g("f-ilac")),
        yetenekler: yetenekleriTopla(),
        aile_durumu: aileDurumu,
      };

      if (duzenlemeId) {
        await ogrenciGuncelle(duzenlemeId, ogrVeri);
      } else {
        await ogrenciEkle(numara, ogrVeri);
      }

      const { kaydedilecek, silinecek } = velileriTopla();
      for (const veliId of silinecek) {
        await veliSil(verilecekId, veliId);
      }
      for (const item of kaydedilecek) {
        await veliEkleGuncelle(verilecekId, item.id, item.veri);
      }

      await autocompleteKaydet(ogrVeri, kaydedilecek.map(v => v.veri));

      toast(duzenlemeId ? "Öğrenci güncellendi." : "Öğrenci eklendi.", "success");
      setTimeout(() => { location.href = `students-detail.html?id=${verilecekId}`; }, 800);

    } catch (err) {
      hataEl.textContent = "Kayıt sırasında hata oluştu: " + err.message;
      hataEl.classList.remove("d-none");
    } finally {
      document.getElementById("kaydet-metin").classList.remove("d-none");
      document.getElementById("kaydet-yuklen").classList.add("d-none");
      document.getElementById("kaydet-btn").disabled = false;
    }
  }

  async function autocompleteKaydet(ogrVeri, veliler) {
    const guncelleler = [
      ["dogum_yerleri", ogrVeri.dogum_yeri]
    ];
    veliler.forEach(v => {
      guncelleler.push(
        ["iller", v.il],
        ["meslekler", v.meslek],
        ["meslek_gruplari", v.meslek_grubu],
        ["gorevler", v.gorev_unvan],
        ["kurumlar", v.kurum]
      );
    });
    for (const [alan, deger] of guncelleler) {
      if (deger) await autocompleteGuncelle(alan, deger);
    }
  }

  function avatarGuncelle() {
    const img = document.getElementById("foto-onizleme");
    if (!img) return;
    img.src = avatarSrc(document.getElementById("f-cinsiyet")?.value);
  }
</script>
