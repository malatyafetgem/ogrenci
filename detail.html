<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mezun Detayı — ÖBS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/ogrenci/assets/css/app.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0" id="sayfa-baslik">Mezun Detayı</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="/ogrenci/dashboard.html">Panel</a></li>
              <li class="breadcrumb-item"><a href="/ogrenci/pages/graduates/list.html">Mezunlar</a></li>
              <li class="breadcrumb-item active" id="breadcrumb-ad">Detay</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">
        <div id="yukleniyor" class="text-center py-5 text-muted">
          <div class="spinner-border text-primary mb-3"></div><div>Yükleniyor...</div>
        </div>

        <div id="icerik" class="d-none">
          <div class="row g-3">

            <!-- Sol: Profil + salt okunur bilgiler -->
            <div class="col-md-4">
              <div class="card">
                <div class="card-body text-center">
                  <img id="profil-foto" src="/ogrenci/assets/img/avatar-default.png"
                       class="ogrenci-avatar-buyuk mb-3" alt="">
                  <h5 id="profil-ad"></h5>
                  <span class="badge bg-success" id="profil-yil"></span>
                  <hr>
                  <div class="text-start" id="profil-bilgiler"></div>
                </div>
              </div>

              <!-- Orijinal öğrenci kaydına bağlantı -->
              <div class="card mt-3">
                <div class="card-body py-2">
                  <a id="ogrenci-link" href="#" class="btn btn-sm btn-outline-secondary w-100">
                    <i class="bi bi-person me-1"></i>Öğrenci Kaydını Görüntüle
                  </a>
                </div>
              </div>
            </div>

            <!-- Sağ: Düzenlenebilir alanlar -->
            <div class="col-md-8">
              <div class="card">
                <div class="card-header">
                  <h6 class="mb-0"><i class="bi bi-pencil me-1"></i>Sonraki Bilgileri Güncelle</h6>
                </div>
                <div class="card-body">
                  <div id="hata-mesaji" class="alert alert-danger d-none"></div>
                  <div id="basari-mesaji" class="alert alert-success d-none"></div>

                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Üniversite</label>
                      <input type="text" class="form-control" id="f-universite"
                             list="uni-list" autocomplete="off">
                      <datalist id="uni-list"></datalist>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Bölüm</label>
                      <input type="text" class="form-control" id="f-bolum"
                             list="bolum-list" autocomplete="off">
                      <datalist id="bolum-list"></datalist>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Meslek</label>
                      <input type="text" class="form-control" id="f-meslek"
                             list="meslek-list" autocomplete="off">
                      <datalist id="meslek-list"></datalist>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Telefon</label>
                      <input type="text" class="form-control" id="f-telefon" inputmode="numeric">
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">E-Posta</label>
                      <input type="email" class="form-control" id="f-eposta">
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Veli Telefonu</label>
                      <input type="text" class="form-control" id="f-veli-tel" inputmode="numeric">
                    </div>
                    <div class="col-12">
                      <label class="form-label">Notlar</label>
                      <textarea class="form-control" id="f-notlar" rows="3"
                                placeholder="Mezun hakkında notlar..."></textarea>
                    </div>
                    <div class="col-12">
                      <button type="button" class="btn btn-primary" id="kaydet-btn">
                        <span id="kaydet-metin"><i class="bi bi-save me-1"></i>Kaydet</span>
                        <span id="kaydet-yuklen" class="d-none">
                          <span class="spinner-border spinner-border-sm me-1"></span>Kaydediliyor...
                        </span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>

<script type="module">
  import { requireAuth } from "/ogrenci/assets/js/core/auth.js";
  import { layoutYukle } from "/ogrenci/assets/js/ui/layout.js";
  import { mezunGetir, mezunGuncelle } from "/ogrenci/assets/js/data/graduates.js";
  import { autocompleteYukle, autocompleteGuncelle } from "/ogrenci/assets/js/data/autocomplete.js";
  import { formatMetin, formatTelefon, baglaFormat, toast } from "/ogrenci/assets/js/core/utils.js";

  const AVATAR = "/ogrenci/assets/img/avatar-default.png";
  let mezunId = null;

  requireAuth(async () => {
    layoutYukle();
    const params = new URLSearchParams(location.search);
    mezunId = params.get("id");
    if (!mezunId) { location.href = "/ogrenci/pages/graduates/list.html"; return; }
    await yukle();
  });

  async function yukle() {
    const m = await mezunGetir(mezunId);
    if (!m) { location.href = "/ogrenci/pages/graduates/list.html"; return; }

    const tamAd = `${m.ad || ""} ${m.soyad || ""}`.trim();
    document.title = `${tamAd} — Mezun — ÖBS`;
    document.getElementById("sayfa-baslik").textContent = tamAd;
    document.getElementById("breadcrumb-ad").textContent = tamAd;
    document.getElementById("profil-foto").src = m.fotograf_url || AVATAR;
    document.getElementById("profil-ad").textContent = tamAd;
    document.getElementById("profil-yil").textContent =
      m.mezuniyet_yili ? `${m.mezuniyet_yili} Mezunu` : "Mezun";
    document.getElementById("ogrenci-link").href =
      `/ogrenci/pages/students/detail.html?id=${mezunId}`;

    // Salt okunur bilgiler
    document.getElementById("profil-bilgiler").innerHTML = [
      ["TC Kimlik", m.tc_kimlik],
      ["Mezuniyet Yılı", m.mezuniyet_yili],
    ].map(([et, dg]) => `
      <div class="d-flex justify-content-between mb-1 small">
        <span class="text-muted">${et}</span>
        <span class="fw-semibold">${dg || "—"}</span>
      </div>`).join("");

    // Autocomplete yükle
    await Promise.all([
      yukleAC("universiteler", "uni-list"),
      yukleAC("bolumler", "bolum-list"),
      yukleAC("meslekler", "meslek-list"),
    ]);

    // Formu doldur
    document.getElementById("f-universite").value = m.universite || "";
    document.getElementById("f-bolum").value = m.bolum || "";
    document.getElementById("f-meslek").value = m.meslek || "";
    document.getElementById("f-telefon").value = m.telefon || "";
    document.getElementById("f-eposta").value = m.e_posta || "";
    document.getElementById("f-veli-tel").value = m.veli_telefon || "";
    document.getElementById("f-notlar").value = m.notlar || "";

    baglaFormat(document.getElementById("f-universite"), "metin");
    baglaFormat(document.getElementById("f-bolum"), "metin");
    baglaFormat(document.getElementById("f-meslek"), "metin");
    baglaFormat(document.getElementById("f-telefon"), "telefon");
    baglaFormat(document.getElementById("f-veli-tel"), "telefon");

    document.getElementById("kaydet-btn").addEventListener("click", kaydet);

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("icerik").classList.remove("d-none");
  }

  async function yukleAC(alan, listId) {
    const degerler = await autocompleteYukle(alan);
    const list = document.getElementById(listId);
    degerler.forEach(d => { const o = document.createElement("option"); o.value = d; list.appendChild(o); });
  }

  async function kaydet() {
    const hataEl   = document.getElementById("hata-mesaji");
    const basariEl = document.getElementById("basari-mesaji");
    hataEl.classList.add("d-none");
    basariEl.classList.add("d-none");

    const universite = formatMetin(document.getElementById("f-universite").value);
    const bolum      = formatMetin(document.getElementById("f-bolum").value);
    const meslek     = formatMetin(document.getElementById("f-meslek").value);
    const telefon    = formatTelefon(document.getElementById("f-telefon").value);
    const eposta     = document.getElementById("f-eposta").value.trim();
    const veliTel    = formatTelefon(document.getElementById("f-veli-tel").value);
    const notlar     = document.getElementById("f-notlar").value.trim();

    document.getElementById("kaydet-metin").classList.add("d-none");
    document.getElementById("kaydet-yuklen").classList.remove("d-none");
    document.getElementById("kaydet-btn").disabled = true;

    try {
      await mezunGuncelle(mezunId, { universite, bolum, meslek, telefon, e_posta: eposta, veli_telefon: veliTel, notlar });
      for (const [alan, deger] of [["universiteler", universite], ["bolumler", bolum], ["meslekler", meslek]]) {
        if (deger) await autocompleteGuncelle(alan, deger);
      }
      toast("Bilgiler güncellendi.", "success");
      basariEl.textContent = "Kaydedildi.";
      basariEl.classList.remove("d-none");
    } catch (err) {
      hataEl.textContent = "Hata: " + err.message;
      hataEl.classList.remove("d-none");
    } finally {
      document.getElementById("kaydet-metin").classList.remove("d-none");
      document.getElementById("kaydet-yuklen").classList.add("d-none");
      document.getElementById("kaydet-btn").disabled = false;
    }
  }
</script>
</body>
</html>
