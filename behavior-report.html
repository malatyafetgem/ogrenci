        <div class="row align-items-center">

    <div class="app-content">
      <div class="container-fluid">

        <!-- Filtreler -->
        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Tür</label>
                <select id="filtre-tur" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Olumlu</option>
                  <option>Olumsuz</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Kategori</label>
                <select id="filtre-kategori" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Yardımseverlik</option><option>Sosyal Katkı</option>
                  <option>Başarılı Davranış</option><option>Disiplin</option>
                  <option>Kıyafet</option><option>Telefon Kullanımı</option>
                  <option>Derse Geç Kalma</option><option>Kavga</option>
                  <option>Kopya</option><option>Diğer</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Tarih Başlangıç</label>
                <input type="text" class="form-control form-control-sm" id="filtre-bas" placeholder="GG.AA.YYYY">
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Tarih Bitiş</label>
                <input type="text" class="form-control form-control-sm" id="filtre-bit" placeholder="GG.AA.YYYY">
              </div>
              <div class="col-6 col-md-2">
                <button id="filtre-uygula" class="btn btn-sm btn-primary w-100" type="button" aria-label="Davranış raporu filtrelerini uygula">
                  <i class="bi bi-search me-1"></i>Filtrele
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Özet Kartlar -->
        <div class="row g-3 mb-3 d-none" id="ozet-kartlar">
          <div class="col-6 col-md-3">
            <div class="card text-center border-0 shadow-sm">
              <div class="card-body py-2">
                <div class="text-muted small">Toplam Kayıt</div>
                <div class="fw-bold fs-4" id="ozet-toplam">0</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-center border-0 shadow-sm">
              <div class="card-body py-2">
                <div class="text-success small"><i class="bi bi-hand-thumbs-up-fill me-1"></i>Olumlu</div>
                <div class="fw-bold fs-4 text-success" id="ozet-olumlu">0</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-center border-0 shadow-sm">
              <div class="card-body py-2">
                <div class="text-danger small"><i class="bi bi-hand-thumbs-down-fill me-1"></i>Olumsuz</div>
                <div class="fw-bold fs-4 text-danger" id="ozet-olumsuz">0</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="card text-center border-0 shadow-sm">
              <div class="card-body py-2">
                <div class="text-muted small"><i class="bi bi-people me-1"></i>Öğrenci Sayısı</div>
                <div class="fw-bold fs-4" id="ozet-ogrenci-sayisi">0</div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-3">
          <!-- Grafikler -->
          <div class="col-12 col-md-4">
            <div class="card h-100">
              <div class="card-header d-flex align-items-center justify-content-between">
                <h6 class="mb-0">Kategori Dağılımı</h6>
                <div class="btn-group btn-group-sm no-print" id="grafik-mod-grup" role="group">
                  <button type="button" class="btn btn-outline-secondary active" data-grafik-mod="tum">Tümü</button>
                  <button type="button" class="btn btn-outline-success" data-grafik-mod="olumlu">Olumlu</button>
                  <button type="button" class="btn btn-outline-danger" data-grafik-mod="olumsuz">Olumsuz</button>
                </div>
              </div>
              <div class="card-body d-flex flex-column align-items-center justify-content-center gap-3">
                <canvas id="kategori-grafik" width="240" height="240"></canvas>
                <!-- Olumlu/Olumsuz karşılaştırma çubuğu -->
                <div id="tur-karsilastirma" class="w-100 d-none">
                  <div class="d-flex justify-content-between small text-muted mb-1">
                    <span><i class="bi bi-hand-thumbs-up-fill text-success me-1"></i>Olumlu</span>
                    <span id="tur-karsilastirma-yuzdeler"></span>
                    <span><i class="bi bi-hand-thumbs-down-fill text-danger me-1"></i>Olumsuz</span>
                  </div>
                  <div class="progress tur-karsilastirma-progress">
                    <div class="progress-bar bg-success tur-bar-baslangic" id="tur-bar-olumlu"></div>
                    <div class="progress-bar bg-danger tur-bar-baslangic" id="tur-bar-olumsuz"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Tablo -->
          <div class="col-12 col-md-8">
            <div class="card">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">Kayıtlar <span class="badge bg-secondary ms-1" id="kayit-sayisi">0</span></h6>
                <div class="d-flex gap-2 no-print">
                  <button class="btn btn-sm btn-success" id="excel-export-btn">
                    <i class="bi bi-file-earmark-excel me-1"></i>Excel
                  </button>
                  <button class="btn btn-sm btn-outline-secondary" data-obs-print>
                    <i class="bi bi-printer me-1"></i>Yazdır
                  </button>
                </div>
              </div>
              <div class="card-body p-0">
                <div id="yukleniyor" class="text-center py-4 text-muted d-none">
                  <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
                </div>
                <div class="table-responsive" id="tablo-kap">
                  <table id="davranis-tablo" class="table table-sm table-hover mb-0 table-fit-desktop print-landscape print-nowrap">
                    <thead class="table-light">
                      <tr>
                        <th>Tarih</th><th>Öğrenci</th><th>Sınıf</th>
                        <th>Tür</th><th>Kategori</th><th>Açıklama</th>
                      </tr>
                    </thead>
                    <tbody id="davranis-tbody">
                      <tr><td colspan="6" class="text-center text-muted py-3">Filtreleri seçip arama düğmesine basın.</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.0/js/dataTables.bootstrap5.min.js"

<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/tr.js"

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"

<script type="module">
  import { requireAuth } from "./auth.js?v=20260603-73";
  import { layoutYukle } from "./layout.js?v=20260603-73";
  import { tumOgrencileriGetir, siniflarGetir, sinifaGoreDavranislariGetir } from "./students.js?v=20260603-73";
  import { tarihtenDate, tarihSiralamaAnahtari, sinifSiralamaAnahtari, compareTarihDesc, escapeHtml, escapeAttr } from "./utils.js?v=20260603-73";

  let raporVerisi = [];
  let dt = null;
  let grafik = null;
  let aktifGrafikMod = "tum"; // "tum" | "olumlu" | "olumsuz"

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await siniflarGetir();
    const sel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => { const o = document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o); });
    flatpickr("#filtre-bas", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });
    flatpickr("#filtre-bit", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });
    document.getElementById("filtre-uygula").addEventListener("click", yukleRapor);
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);

    // Grafik mod butonları
    document.querySelectorAll("[data-grafik-mod]").forEach(btn => {
      btn.addEventListener("click", () => {
        aktifGrafikMod = btn.dataset.grafikMod;
        document.querySelectorAll("[data-grafik-mod]").forEach(b => {
          b.classList.remove("active");
          b.className = b.className.replace(/btn-(success|danger|secondary)/, "btn-outline-secondary");
        });
        btn.classList.add("active");
        if (aktifGrafikMod === "olumlu") btn.className = btn.className.replace("btn-outline-success", "btn-success");
        else if (aktifGrafikMod === "olumsuz") btn.className = btn.className.replace("btn-outline-danger", "btn-danger");
        grafikGuncelle();
      });
    });

    tabloBekle();
  });

  function iskeletGoster() {
    if (dt) { dt.destroy(); dt = null; }
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
    const tbody = document.getElementById("davranis-tbody");
    const satir = `<tr>${Array.from({ length: 6 }).map(() => `<td><div class="skeleton skeleton-satir"></div></td>`).join("")}</tr>`;
    tbody.innerHTML = satir.repeat(7);
  }

  function tabloBekle() {
    if (dt) { dt.destroy(); dt = null; }
    if (grafik) { grafik.destroy(); grafik = null; }
    raporVerisi = [];
    document.getElementById("kayit-sayisi").textContent = "0";
    document.getElementById("ozet-kartlar").classList.add("d-none");
    document.getElementById("tur-karsilastirma").classList.add("d-none");
    document.getElementById("davranis-tbody").innerHTML =
      `<tr><td colspan="6" class="text-center text-muted py-3">Filtreleri seçip arama düğmesine basın.</td></tr>`;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  async function yukleRapor() {
    iskeletGoster();
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    const filtSinif    = document.getElementById("filtre-sinif").value;
    const filtTur      = document.getElementById("filtre-tur").value;
    const filtKategori = document.getElementById("filtre-kategori").value;
    const filtBas      = document.getElementById("filtre-bas").value;
    const filtBit      = document.getElementById("filtre-bit").value;

    // sinifaGoreDavranislariGetir: sinif seçiliyse yalnızca o sınıfın
    // kayıtlarını Firestore'dan çeker; boşsa tüm koleksiyonu getirir.
    const [ogrenciler, tumKayitlar] = await Promise.all([
      tumOgrencileriGetir(),
      sinifaGoreDavranislariGetir(filtSinif)
    ]);
    const ogrById = new Map(ogrenciler.map(ogr => [ogr.id, ogr]));
    raporVerisi = [];

    tumKayitlar.forEach(k => {
      const ogr = ogrById.get(k.ogrenciId);
      if (!ogr) return;
      if (filtSinif && ogr.sinif !== filtSinif) return;
      if (filtTur && k.tur !== filtTur) return;
      if (filtKategori && k.kategori !== filtKategori) return;
      if (filtBas || filtBit) {
        const t = tarihtenDate(k.tarih);
        if (!t) return;
        if (filtBas && t < tarihtenDate(filtBas)) return;
        if (filtBit && t > tarihtenDate(filtBit)) return;
      }
      raporVerisi.push({ ogr, ...k });
    });

    raporVerisi.sort((a, b) => compareTarihDesc(a.tarih, b.tarih));

    // Özet kartları güncelle
    const olumluSayisi = raporVerisi.filter(d => d.tur === "Olumlu").length;
    const olumsuzSayisi = raporVerisi.filter(d => d.tur === "Olumsuz").length;
    const teksilOgrenci = new Set(raporVerisi.map(d => d.ogr.id)).size;
    document.getElementById("kayit-sayisi").textContent = raporVerisi.length;
    document.getElementById("ozet-toplam").textContent = raporVerisi.length;
    document.getElementById("ozet-olumlu").textContent = olumluSayisi;
    document.getElementById("ozet-olumsuz").textContent = olumsuzSayisi;
    document.getElementById("ozet-ogrenci-sayisi").textContent = teksilOgrenci;
    document.getElementById("ozet-kartlar").classList.toggle("d-none", raporVerisi.length === 0);

    const tbody = document.getElementById("davranis-tbody");
    if (raporVerisi.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="bos-durum">
          <i class="bi bi-search"></i>
          <div class="baslik">Kayıt bulunamadı</div>
          <div class="aciklama">Filtreleri değiştirip tekrar deneyin.</div>
        </div></td></tr>`;
    } else {
      tbody.innerHTML = raporVerisi.map(d => {
        const olumlu = d.tur === "Olumlu";
        const tamAd = `${d.ogr.ad} ${d.ogr.soyad}`.trim();
        return `<tr>
          <td data-order="${escapeAttr(tarihSiralamaAnahtari(d.tarih))}">${escapeHtml(d.tarih || "—")}</td>
          <td><a href="students-detail.html?id=${escapeAttr(d.ogr.id)}" class="text-decoration-none">${escapeHtml(tamAd)}</a></td>
          <td data-order="${escapeAttr(sinifSiralamaAnahtari(d.ogr.sinif))}">${escapeHtml(d.ogr.sinif || "—")}</td>
          <td><span class="badge ${olumlu ? "bg-success" : "bg-danger"}">${escapeHtml(d.tur)}</span></td>
          <td>${escapeHtml(d.kategori || "—")}</td>
          <td class="small text-muted">${escapeHtml(d.aciklama || "—")}</td>
        </tr>`;
      }).join("");

      dt = new DataTable("#davranis-tablo", {
        language: {
          search: "Ara:", lengthMenu: "_MENU_ kayıt göster",
          info: "_TOTAL_ kayıt içinden _START_–_END_",
          infoEmpty: "Kayıt yok", zeroRecords: "Bulunamadı",
          emptyTable: "Kayıt yok",
          paginate: { next: "İleri", previous: "Geri" }
        },
        pageLength: 20, order: [[0, "desc"]]
      });
    }

    grafikGuncelle();

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function grafikGuncelle() {
    const renkler = ["#0d6efd","#198754","#dc3545","#ffc107","#6f42c1","#0dcaf0","#fd7e14","#6c757d","#d63384","#20c997"];

    // Filtrelenmiş veri
    const filtreliVeri = aktifGrafikMod === "olumlu"
      ? raporVerisi.filter(d => d.tur === "Olumlu")
      : aktifGrafikMod === "olumsuz"
        ? raporVerisi.filter(d => d.tur === "Olumsuz")
        : raporVerisi;

    const kategoriSayac = {};
    filtreliVeri.forEach(d => { kategoriSayac[d.kategori] = (kategoriSayac[d.kategori] || 0) + 1; });
    const etiketler = Object.keys(kategoriSayac);
    const veriler = etiketler.map(k => kategoriSayac[k]);

    if (grafik) grafik.destroy();
    if (etiketler.length > 0) {
      grafik = new Chart(document.getElementById("kategori-grafik"), {
        type: "doughnut",
        data: { labels: etiketler, datasets: [{ data: veriler, backgroundColor: renkler.slice(0, etiketler.length) }] },
        options: {
          plugins: {
            legend: { position: "bottom", labels: { font: { size: 11 }, boxWidth: 14 } },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const toplam = ctx.dataset.data.reduce((a, b) => a + b, 0);
                  const pct = toplam ? ((ctx.parsed / toplam) * 100).toFixed(1) : 0;
                  return ` ${ctx.label}: ${ctx.parsed} (%${pct})`;
                }
              }
            }
          },
          cutout: "50%"
        }
      });
    }

    // Olumlu/Olumsuz oranı çubuğu
    const olumluSayisi = raporVerisi.filter(d => d.tur === "Olumlu").length;
    const olumsuzSayisi = raporVerisi.filter(d => d.tur === "Olumsuz").length;
    const toplamTur = olumluSayisi + olumsuzSayisi;
    const karsilastirmaEl = document.getElementById("tur-karsilastirma");
    if (toplamTur > 0) {
      const olumluPct = Math.round((olumluSayisi / toplamTur) * 100);
      const olumsuzPct = 100 - olumluPct;
      document.getElementById("tur-bar-olumlu").style.width = olumluPct + "%";
      document.getElementById("tur-bar-olumsuz").style.width = olumsuzPct + "%";
      document.getElementById("tur-karsilastirma-yuzdeler").textContent = `%${olumluPct} / %${olumsuzPct}`;
      karsilastirmaEl.classList.remove("d-none");
    } else {
      karsilastirmaEl.classList.add("d-none");
    }
  }

  function excelExport() {
    const satirlar = raporVerisi.map(d => ({
      "Tarih": d.tarih, "Ad": d.ogr.ad, "Soyad": d.ogr.soyad, "Sınıf": d.ogr.sinif,
      "Tür": d.tur, "Kategori": d.kategori, "Açıklama": d.aciklama
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Davranış");
    XLSX.writeFile(wb, `davranis_raporu_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

</script>
</body>
