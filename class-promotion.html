<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest?v=20260531-34">
  <meta name="theme-color" content="#D9542B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Öğrenci Bilgileri">
  <link rel="apple-touch-icon" href="apple-touch-icon-180.png?v=20260531-34">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260531-34">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=20260531-34">
  <link rel="shortcut icon" href="favicon.ico?v=20260531-34">
  <script src="file-redirect.js?v=20260531-34"></script>
  <script src="pwa.js?v=20260531-34"></script>
  <title>Sınıf Atlatma</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="app.css?v=20260531-34">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Sınıf Atlatma</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Sınıf Atlatma</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <div class="alert alert-warning d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-exclamation-triangle-fill fs-5"></i>
          <div>
            <strong>Dikkat!</strong> Bu işlem tüm aktif öğrencilerin sınıfını toplu güncelleyecektir.
            9→10, 10→11, 11→12 geçişi otomatik yapılır. 12. sınıf öğrencileri bu aktif sistemden çıkarılır.
          </div>
        </div>

        <div id="yukleniyor" class="text-center py-4 text-muted">
          <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
        </div>

        <div id="icerik" class="d-none">
          <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h6 class="mb-0"><i class="bi bi-arrow-up-circle me-1"></i>Sınıf Aktarım Tablosu</h6>
              <div class="d-flex gap-2">
                <button id="toplu-otomatik-btn" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-magic me-1"></i>Otomatik Seç
                </button>
                <button id="onayla-btn" class="btn btn-sm btn-danger">
                  <i class="bi bi-check-circle me-1"></i>Aktarımı Uygula
                </button>
              </div>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-sm mb-0 align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>No</th>
                      <th>Ad Soyad</th>
                      <th>Mevcut Sınıf</th>
                      <th>Sonraki Sınıf</th>
                      <th>İşlem</th>
                    </tr>
                  </thead>
                  <tbody id="aktarim-tbody"></tbody>
                </table>
              </div>
            </div>
          </div>

          <div id="sonuc-kap" class="d-none">
            <div class="alert alert-success" id="sonuc-mesaj"></div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>

<script type="module">
  import { requireAdmin } from "./auth.js?v=20260531-34";
  import { layoutYukle } from "./layout.js?v=20260531-34";
  import { tumOgrencileriGetir, veriCacheleriniTemizle } from "./students.js?v=20260531-34";
  import { db } from "./firebase-config.js?v=20260531-34";
  import {
    collection, getDocs, doc, writeBatch, query, where
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { toast, onayIste, sinifParcala, escapeHtml, escapeAttr } from "./utils.js?v=20260531-34";

  let ogrenciler = [];
  const islemler = {};
  const BAGLI_KOLEKSIYONLAR = ["veliler", "devamsizliklar", "davranislar", "veligorusmeleri"];

  requireAdmin(async () => {
    layoutYukle();
    await yukle();
    baglayici();
  });

  async function yukle() {
    try {
      ogrenciler = await tumOgrencileriGetir();
      tabloGoster();
      document.getElementById("yukleniyor").classList.add("d-none");
      document.getElementById("icerik").classList.remove("d-none");
    } catch (err) {
      document.getElementById("yukleniyor").innerHTML =
        `<div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Veriler yüklenemedi. Bağlantınızı kontrol edip sayfayı yenileyin.
          <div class="small text-muted mt-1">${escapeHtml(err.message)}</div>
        </div>`;
    }
  }

  function sinifHesapla(sinif) {
    const raw = String(sinif || "").trim();
    if (!raw) return null;
    const parca = sinifParcala(raw);
    if (!Number.isFinite(parca.seviye)) return null;
    if (parca.seviye < 12) {
      return raw.replace(/\d{1,2}/, String(parca.seviye + 1));
    }
    return "SISTEMDEN_CIKAR";
  }

  function tabloGoster() {
    const tbody = document.getElementById("aktarim-tbody");
    tbody.innerHTML = ogrenciler.map(o => {
      const sonrakiSinif = sinifHesapla(o.sinif);
      const sonSinif = sonrakiSinif === "SISTEMDEN_CIKAR";
      const mevcut = islemler[o.id] || (sonSinif ? "cikar" : "gecis");

      return `<tr id="satir-${escapeAttr(o.id)}">
        <td>${escapeHtml(o.id)}</td>
        <td><a href="students-detail.html?id=${escapeAttr(o.id)}" class="text-decoration-none">
          ${escapeHtml(`${o.ad || ""} ${o.soyad || ""}`.trim())}</a></td>
        <td><span class="badge bg-secondary">${escapeHtml(o.sinif || "—")}</span></td>
        <td id="sonraki-${escapeAttr(o.id)}">
          ${sonSinif
            ? `<span class="badge bg-danger">Sistemden çıkarılacak</span>`
            : `<span class="badge bg-primary">${escapeHtml(sonrakiSinif || "—")}</span>`}
        </td>
        <td>
          <select class="form-select form-select-sm" style="max-width:180px"
                  onchange="islemSec('${o.id}', this.value)">
            ${sonSinif
              ? `<option value="cikar" ${mevcut === "cikar" ? "selected" : ""}>Sistemden Çıkar</option>
                 <option value="kalir" ${mevcut === "kalir" ? "selected" : ""}>Sınıfta Kal</option>`
              : `<option value="gecis" ${mevcut === "gecis" ? "selected" : ""}>Bir Üst Sınıfa Geç</option>
                 <option value="kalir" ${mevcut === "kalir" ? "selected" : ""}>Sınıfta Kal</option>`}
            <option value="sil" ${mevcut === "sil" ? "selected" : ""}>Sil (Nakil/Ayrıldı)</option>
          </select>
        </td>
      </tr>`;
    }).join("");
  }

  window.islemSec = (ogrId, islem) => {
    islemler[ogrId] = islem;
  };

  function baglayici() {
    document.getElementById("toplu-otomatik-btn").addEventListener("click", () => {
      ogrenciler.forEach(o => {
        const sonSinif = sinifHesapla(o.sinif) === "SISTEMDEN_CIKAR";
        islemler[o.id] = sonSinif ? "cikar" : "gecis";
      });
      tabloGoster();
      toast("Tüm öğrenciler için otomatik seçim yapıldı.", "info");
    });

    document.getElementById("onayla-btn").addEventListener("click", async () => {
      const onaylaBtn = document.getElementById("onayla-btn");
      const onaylaBtnOrijinal = onaylaBtn.innerHTML;

      // Silinecek öğrencileri belirle
      const silinecekler = ogrenciler.filter(o => {
        const islem = islemler[o.id] || (sinifHesapla(o.sinif) === "SISTEMDEN_CIKAR" ? "cikar" : "gecis");
        return islem === "cikar" || islem === "sil";
      });

      let ozet = "";
      let onayMetni = "AKTAR";
      let onayButonu = "Aktarımı Uygula";

      if (silinecekler.length > 0) {
        // Sayım sırasında butonu kilitle
        onaylaBtn.disabled = true;
        onaylaBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>Kayıtlar hesaplanıyor...`;

        try {
          // Bağlı kayıt sayılarını hesapla
          let toplamVeli = 0, toplamDevamsizlik = 0, toplamDavranis = 0, toplamGorusme = 0;
          const ogrenciOzetleri = [];
          for (const o of silinecekler) {
            for (const kol of BAGLI_KOLEKSIYONLAR) {
              const snap = await getDocs(query(collection(db, kol), where("ogrenciId", "==", o.id)));
              if (kol === "veliler")           toplamVeli += snap.size;
              else if (kol === "devamsizliklar") toplamDevamsizlik += snap.size;
              else if (kol === "davranislar")   toplamDavranis += snap.size;
              else if (kol === "veligorusmeleri") toplamGorusme += snap.size;
            }
            ogrenciOzetleri.push(`• ${o.ad} ${o.soyad} (${o.sinif})`);
          }

          ozet = `⚠️ BU İŞLEM GERİ ALINAMAZ. Devam etmeden önce yedek almanız önerilir.\n\n` +
                 `Kalıcı olarak silinecekler:\n` +
                 `• ${silinecekler.length} öğrenci\n` +
                 `• ${toplamVeli} veli kaydı\n` +
                 `• ${toplamDevamsizlik} devamsızlık kaydı\n` +
                 `• ${toplamDavranis} davranış kaydı\n` +
                 `• ${toplamGorusme} veli görüşmesi\n\n` +
                 (ogrenciOzetleri.length <= 10
                   ? ogrenciOzetleri.join("\n")
                   : ogrenciOzetleri.slice(0, 10).join("\n") + `\n... ve ${ogrenciOzetleri.length - 10} öğrenci daha`);

          onayMetni = "SINIF ATLAT VE SİL";
          onayButonu = "Uygula (Geri Alınamaz)";
        } catch (err) {
          toast("Kayıt sayısı hesaplanamadı: " + err.message, "danger");
          onaylaBtn.disabled = false;
          onaylaBtn.innerHTML = onaylaBtnOrijinal;
          return;
        } finally {
          onaylaBtn.disabled = false;
          onaylaBtn.innerHTML = onaylaBtnOrijinal;
        }
      } else {
        ozet = "Silinecek öğrenci yok. Sınıf geçişleri ve aynı sınıfta kalanlar işlenecek.";
        onayMetni = "AKTAR";
        onayButonu = "Aktarımı Uygula";
      }

      const onay = await onayIste({
        baslik: "Sınıf atlatmayı uygula",
        mesaj: silinecekler.length > 0
          ? `${silinecekler.length} öğrenci ve tüm bağlı kayıtları kalıcı olarak silinecek.`
          : "Seçili işlemler tüm aktif öğrencilere uygulanacak.",
        detay: ozet,
        onayMetni,
        onayButonu,
        tip: "danger"
      });
      if (!onay) return;
      document.getElementById("onayla-btn").disabled = true;
      document.getElementById("onayla-btn").innerHTML =
        `<span class="spinner-border spinner-border-sm me-1"></span>İşleniyor...`;

      let basarili = 0, cikarildi = 0, kalir = 0, silindi = 0, hatali = 0;
      const hataMesajlari = [];
      let batch = writeBatch(db);
      let yazmaSayisi = 0;

      async function yaz(apply) {
        if (yazmaSayisi >= 450) await batchiGonder();
        apply(batch);
        yazmaSayisi++;
      }

      async function batchiGonder() {
        if (yazmaSayisi === 0) return;
        await batch.commit();
        batch = writeBatch(db);
        yazmaSayisi = 0;
      }

      for (const o of ogrenciler) {
        const islem = islemler[o.id] || (sinifHesapla(o.sinif) === "SISTEMDEN_CIKAR" ? "cikar" : "gecis");
        try {
          if (islem === "gecis") {
            const yeni = sinifHesapla(o.sinif);
            if (!yeni || yeni === "SISTEMDEN_CIKAR") throw new Error("Sınıf hesaplanamadı");
            await yaz(b => b.update(doc(db, "students", o.id), { sinif: yeni }));
            basarili++;
          } else if (islem === "cikar") {
            await ogrenciyiSistemdenCikar(o.id, yaz);
            cikarildi++;
          } else if (islem === "kalir") {
            kalir++;
          } else if (islem === "sil") {
            await ogrenciyiSistemdenCikar(o.id, yaz);
            silindi++;
          }
        } catch (err) {
          hatali++;
          hataMesajlari.push(`${o.id}: ${err.message}`);
        }
      }

      try {
        await batchiGonder();
      } catch (err) {
        hatali++;
        hataMesajlari.push(`Toplu yazma: ${err.message}`);
      }

      document.getElementById("sonuc-kap").classList.remove("d-none");
      document.getElementById("sonuc-mesaj").innerHTML =
        `Aktarım tamamlandı: <strong>${basarili}</strong> öğrenci bir üst sınıfa geçirildi, 
         <strong>${cikarildi}</strong> öğrenci sistemden çıkarıldı, 
         <strong>${kalir}</strong> öğrenci aynı sınıfta bırakıldı,
         <strong>${silindi}</strong> öğrenci silindi${hatali ? `, <strong>${hatali}</strong> işlem hata verdi` : ""}.
         ${hataMesajlari.length ? `<div class="small mt-2">${escapeHtml(hataMesajlari.slice(0, 5).join(" | "))}</div>` : ""}`;

      document.getElementById("onayla-btn").disabled = false;
      document.getElementById("onayla-btn").innerHTML =
        `<i class="bi bi-check-circle me-1"></i>Aktarımı Uygula`;

      toast("Sınıf atlatma tamamlandı.", "success");
      veriCacheleriniTemizle();
      await yukle();
    });
  }

  async function ogrenciyiSistemdenCikar(ogrenciId, yaz) {
    for (const koleksiyon of BAGLI_KOLEKSIYONLAR) {
      const snap = await getDocs(query(collection(db, koleksiyon), where("ogrenciId", "==", ogrenciId)));
      for (const d of snap.docs) {
        await yaz(b => b.delete(d.ref));
      }
    }
    await yaz(b => b.delete(doc(db, "students", ogrenciId)));
  }
</script>
</body>
</html>
