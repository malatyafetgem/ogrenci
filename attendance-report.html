<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="file-redirect.js?v=20260529-29"></script>
  <title>Devamsızlık Raporu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="app.css?v=20260529-29">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Devamsızlık Raporu</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Devamsızlık Raporu</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <!-- Filtreler -->
        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Tür</label>
                <select id="filtre-tur" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Özürsüz</option>
                  <option>Özürlü</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Tarih Başlangıç</label>
                <input type="text" class="form-control form-control-sm" id="filtre-bas" placeholder="GG.AA.YYYY">
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Tarih Bitiş</label>
                <input type="text" class="form-control form-control-sm" id="filtre-bit" placeholder="GG.AA.YYYY">
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Sadece Uyarılar</label>
                <select id="filtre-uyari" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option value="uyari">Uyarı</option>
                  <option value="kritik">Kritik</option>
                  <option value="kaldi">Kaldı</option>
                </select>
              </div>
              <div class="col-6 col-md-1">
                <button id="filtre-uygula" class="btn btn-sm btn-primary w-100">
                  <i class="bi bi-search"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Tablo -->
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0"><i class="bi bi-calendar-x me-1"></i>Devamsızlık Özeti</h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" data-obs-print>
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="yukleniyor" class="text-center py-4 text-muted d-none">
              <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
            </div>
            <div class="table-responsive" id="tablo-kap">
              <table id="rapor-tablo" class="table table-sm table-hover mb-0 align-middle table-fit-desktop print-landscape print-nowrap">
                <thead class="table-light">
                  <tr>
                    <th>No</th>
                    <th>Ad Soyad</th>
                    <th>Sınıf</th>
                    <th class="text-center">Özürsüz</th>
                    <th class="text-center">Özürlü</th>
                    <th class="text-center">Toplam</th>
                    <th class="text-center">Durum</th>
                  </tr>
                </thead>
                <tbody id="rapor-tbody">
                  <tr><td colspan="7" class="text-center text-muted py-3">Filtreleri seçip arama düğmesine basın.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/tr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
  import { requireAuth } from "./auth.js?v=20260529-29";
  import { layoutYukle } from "./layout.js?v=20260529-29";
  import { tumOgrencileriGetir, siniflarGetir, tumDevamsizliklariGetir, devamsizlikHesapla } from "./students.js?v=20260529-29";
  import {
    devamsizlikDurum, devamsizlikRenk, devamsizlikGunDegeriAralik,
    sinifSiralamaAnahtari, ogrenciNoSiralamaAnahtari, sayiEtiketiTR,
    escapeHtml, escapeAttr
  } from "./utils.js?v=20260529-29";

  let raporVerisi = [];
  let dt = null;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await siniflarGetir();
    const sel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; sel.appendChild(o); });

    flatpickr("#filtre-bas", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });
    flatpickr("#filtre-bit", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });

    document.getElementById("filtre-uygula").addEventListener("click", yukleRapor);
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
    tabloBekle();
  });

  function tabloBekle() {
    if (dt) { dt.destroy(); dt = null; }
    raporVerisi = [];
    document.getElementById("rapor-tbody").innerHTML =
      `<tr><td colspan="7" class="text-center text-muted py-3">Filtreleri seçip arama düğmesine basın.</td></tr>`;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  async function yukleRapor() {
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    const filtSinif = document.getElementById("filtre-sinif").value;
    const filtTur   = document.getElementById("filtre-tur").value;
    const filtBas   = document.getElementById("filtre-bas").value;
    const filtBit   = document.getElementById("filtre-bit").value;
    const filtUyari = document.getElementById("filtre-uyari").value;

    const [ogrenciler, tumKayitlar] = await Promise.all([
      tumOgrencileriGetir(),
      tumDevamsizliklariGetir()
    ]);
    const kayitlarByOgrenci = new Map();
    tumKayitlar.forEach(k => {
      if (!kayitlarByOgrenci.has(k.ogrenciId)) kayitlarByOgrenci.set(k.ogrenciId, []);
      kayitlarByOgrenci.get(k.ogrenciId).push(k);
    });
    raporVerisi = [];

    for (const ogr of ogrenciler) {
      if (filtSinif && ogr.sinif !== filtSinif) continue;
      let kayitlar = kayitlarByOgrenci.get(ogr.id) || [];

      if (filtBas || filtBit) {
        kayitlar = kayitlar
          .map(k => ({ ...k, gun_degeri: devamsizlikGunDegeriAralik(k, filtBas, filtBit) }))
          .filter(k => k.gun_degeri > 0);
      }

      // Tür filtresi
      if (filtTur) kayitlar = kayitlar.filter(k => k.tur === filtTur);

      const { ozurlu, ozursuz } = devamsizlikHesapla(kayitlar);
      const durum = devamsizlikDurum(ozurlu, ozursuz);

      if (filtUyari && durum !== filtUyari) continue;

      raporVerisi.push({ ogr, ozurlu, ozursuz, durum });
    }

    const tbody = document.getElementById("rapor-tbody");
    if (raporVerisi.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-3">Kayıt bulunamadı.</td></tr>`;
    } else {
      tbody.innerHTML = raporVerisi.map(({ ogr, ozurlu, ozursuz, durum }) => {
        const renk = devamsizlikRenk(durum);
        const tamAd = `${ogr.ad} ${ogr.soyad}`.trim();
        const etiket = devamsizlikDurumEtiketi(durum);
        return `<tr>
          <td data-order="${escapeAttr(ogrenciNoSiralamaAnahtari(ogr))}">${escapeHtml(ogr.numara || ogr.id)}</td>
          <td><a href="students-detail.html?id=${escapeAttr(ogr.id)}" class="text-decoration-none">${escapeHtml(tamAd)}</a></td>
          <td data-order="${escapeAttr(sinifSiralamaAnahtari(ogr.sinif))}">${escapeHtml(ogr.sinif || "—")}</td>
          <td class="text-center">${sayiEtiketiTR(ozursuz)}</td>
          <td class="text-center">${sayiEtiketiTR(ozurlu)}</td>
          <td class="text-center fw-semibold">${sayiEtiketiTR(ozurlu + ozursuz)}</td>
          <td class="text-center"><span class="badge bg-${renk}">${etiket}</span></td>
        </tr>`;
      }).join("");

      dt = new DataTable("#rapor-tablo", {
        language: {
          search: "Ara:", lengthMenu: "_MENU_ kayıt göster",
          info: "_TOTAL_ kayıt içinden _START_–_END_",
          infoEmpty: "Kayıt yok", zeroRecords: "Bulunamadı",
          paginate: { first: "İlk", last: "Son", next: "İleri", previous: "Geri" }
        },
        pageLength: 25,
        order: [[2, "asc"], [0, "asc"]]
      });
    }

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function excelExport() {
    const satirlar = raporVerisi.map(({ ogr, ozurlu, ozursuz, durum }) => ({
      "No": ogr.numara || ogr.id,
      "Ad": ogr.ad,
      "Soyad": ogr.soyad,
      "Sınıf": ogr.sinif,
      "Özürsüz Gün": ozursuz,
      "Özürlü Gün": ozurlu,
      "Toplam Gün": ozurlu + ozursuz,
      "Durum": devamsizlikDurumEtiketi(durum)
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Devamsızlık");
    XLSX.writeFile(wb, `devamsizlik_raporu_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  function devamsizlikDurumEtiketi(durum) {
    if (durum === "kaldi") return "Kaldı";
    if (durum === "kritik") return "Kritik";
    if (durum === "uyari") return "Uyarı";
    return "Normal";
  }

</script>
</body>
</html>
