<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest?v=20260603-68">
  <meta name="theme-color" content="#D9542B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Öğrenci Bilgileri">
  <link rel="apple-touch-icon" href="apple-touch-icon-180.png?v=20260603-68">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260603-68">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=20260603-68">
  <link rel="shortcut icon" href="favicon.ico?v=20260603-68">
  <script src="file-redirect.js?v=20260603-68"></script>
  <script src="pwa.js?v=20260603-68"></script>
  <title>Davranış Gir</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <link rel="stylesheet" href="app.css?v=20260603-68">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Davranış Gir</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Davranış Gir</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">
        <div class="card davranis-form-card">
          <div class="card-body">
            <div id="hata-mesaji" class="alert alert-danger d-none"></div>
            <div id="basari-mesaji" class="alert alert-success d-none"></div>

            <!-- Tür seçimi -->
            <div class="d-flex gap-3 justify-content-center mb-4">
              <button type="button" class="btn btn-outline-success tur-buton" id="btn-olumlu">
                <i class="bi bi-hand-thumbs-up-fill me-2"></i>Olumlu
              </button>
              <button type="button" class="btn btn-outline-danger tur-buton" id="btn-olumsuz">
                <i class="bi bi-hand-thumbs-down-fill me-2"></i>Olumsuz
              </button>
            </div>
            <input type="hidden" id="d-tur">

            <!-- Form -->
            <div id="form-alani" class="d-none">
              <!-- Öğrenci -->
              <div class="mb-3">
                <label class="form-label">Öğrenci <span class="text-danger">*</span></label>
                <div class="position-relative">
                  <input type="text" class="form-control" id="ogr-ara"
                         placeholder="Ad, soyad veya numara..." autocomplete="off">
                  <div id="ara-sonuclar" class="ac-dropdown d-none"></div>
                </div>
                <input type="hidden" id="secili-ogr-id">
                <div id="secili-ogr-bilgi" class="mt-1 d-none">
                  <span class="badge bg-primary" id="secili-ogr-ad"></span>
                </div>
              </div>

              <!-- Tarih -->
              <div class="mb-3">
                <label class="form-label">Tarih <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="d-tarih" placeholder="GG.AA.YYYY">
              </div>

              <!-- Kategori -->
              <div class="mb-3">
                <label class="form-label">Kategori <span class="text-danger">*</span></label>
                <select class="form-select" id="d-kategori">
                  <option value="">Seçin</option>
                </select>
              </div>

              <!-- Açıklama -->
              <div class="mb-3">
                <label class="form-label">Açıklama</label>
                <textarea class="form-control" id="d-aciklama" rows="3"
                          placeholder="Davranışa ilişkin not..."></textarea>
              </div>

              <button type="button" class="btn btn-primary w-100" id="kaydet-btn">
                <span id="kaydet-metin"><i class="bi bi-save me-1"></i>Kaydet</span>
                <span id="kaydet-yuklen" class="d-none">
                  <span class="spinner-border spinner-border-sm me-1"></span>Kaydediliyor...
                </span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/tr.js"></script>

<script type="module">
  import { requireAdmin } from "./auth.js?v=20260603-68";
  import { layoutYukle } from "./layout.js?v=20260603-68";
  import { tumOgrencileriGetir, davranisEkle } from "./students.js?v=20260603-68";
  import { escapeHtml, escapeAttr } from "./utils.js?v=20260603-68";

  const KATEGORILER = {
    Olumlu:  ["Yardımseverlik", "Sosyal Katkı", "Başarılı Davranış", "Diğer"],
    Olumsuz: ["Disiplin", "Kıyafet", "Telefon Kullanımı", "Derse Geç Kalma", "Kavga", "Kopya", "Diğer"]
  };

  let tumOgrenciler = [];
  let secilenTur = "";

  requireAdmin(async () => {
    layoutYukle();
    try {
      tumOgrenciler = await tumOgrencileriGetir();
    } catch (err) {
      document.querySelector(".app-content .container-fluid").innerHTML =
        `<div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Veriler yüklenemedi. Bağlantınızı kontrol edip tekrar deneyin.
          <div class="small text-muted mt-1">${err.message}</div>
        </div>`;
      return;
    }
    baglayici();
    flatpickr("#d-tarih", { locale: "tr", dateFormat: "d.m.Y", defaultDate: "today" });

    // URL'den öğrenci ve tür gelebilir
    const params = new URLSearchParams(location.search);
    const ogrId = params.get("id");
    const tur = params.get("tur");
    if (tur === "Olumlu" || tur === "Olumsuz") turSec(tur);
    if (ogrId) {
      const ogr = tumOgrenciler.find(o => o.id === ogrId);
      if (ogr) ogrenciSec(ogr);
    }
  });

  function turSec(tur) {
    secilenTur = tur;
    document.getElementById("d-tur").value = tur;
    document.getElementById("form-alani").classList.remove("d-none");

    const btnO = document.getElementById("btn-olumlu");
    const btnN = document.getElementById("btn-olumsuz");
    btnO.className = `btn btn-outline-success tur-buton${tur === "Olumlu" ? " secili-olumlu" : ""}`;
    btnN.className = `btn btn-outline-danger tur-buton${tur === "Olumsuz" ? " secili-olumsuz" : ""}`;

    const katSel = document.getElementById("d-kategori");
    katSel.innerHTML = `<option value="">Seçin</option>`;
    KATEGORILER[tur].forEach(k => {
      const o = document.createElement("option"); o.value = k; o.textContent = k; katSel.appendChild(o);
    });
  }

  function ogrenciSec(ogr) {
    document.getElementById("ogr-ara").value = `${ogr.ad} ${ogr.soyad}`;
    document.getElementById("secili-ogr-id").value = ogr.id;
    document.getElementById("secili-ogr-ad").textContent = `${ogr.ad} ${ogr.soyad} · ${ogr.sinif}`;
    document.getElementById("secili-ogr-bilgi").classList.remove("d-none");
    document.getElementById("ara-sonuclar").classList.add("d-none");
  }

  function baglayici() {
    document.getElementById("btn-olumlu").addEventListener("click", () => turSec("Olumlu"));
    document.getElementById("btn-olumsuz").addEventListener("click", () => turSec("Olumsuz"));

    const araEl = document.getElementById("ogr-ara");
    const sonucEl = document.getElementById("ara-sonuclar");
    araEl.addEventListener("input", () => {
      const q = araEl.value.trim().toLowerCase();
      if (q.length < 2) { sonucEl.classList.add("d-none"); return; }
      const eslesen = tumOgrenciler.filter(o =>
        `${o.ad} ${o.soyad} ${o.numara}`.toLowerCase().includes(q)
      ).slice(0, 8);
      if (!eslesen.length) { sonucEl.classList.add("d-none"); return; }
      sonucEl.innerHTML = eslesen.map(o =>
        `<div class="ac-item" data-id="${escapeAttr(o.id)}">
          <strong>${escapeHtml(`${o.ad || ""} ${o.soyad || ""}`.trim())}</strong>
          <span class="text-muted ms-2 small">${escapeHtml(o.sinif || "")} · No: ${escapeHtml(o.numara || o.id)}</span>
        </div>`).join("");
      sonucEl.classList.remove("d-none");
      sonucEl.querySelectorAll(".ac-item").forEach(el =>
        el.addEventListener("click", () => {
          ogrenciSec(tumOgrenciler.find(o => o.id === el.dataset.id));
        })
      );
    });
    document.addEventListener("click", e => { if (!araEl.contains(e.target)) sonucEl.classList.add("d-none"); });

    document.getElementById("kaydet-btn").addEventListener("click", kaydet);
  }

  async function kaydet() {
    const ogrId    = document.getElementById("secili-ogr-id").value;
    const tur      = document.getElementById("d-tur").value;
    const tarih    = document.getElementById("d-tarih").value.trim();
    const kategori = document.getElementById("d-kategori").value;
    const aciklama = document.getElementById("d-aciklama").value.trim();
    const hataEl   = document.getElementById("hata-mesaji");
    const basariEl = document.getElementById("basari-mesaji");

    hataEl.classList.add("d-none");
    basariEl.classList.add("d-none");

    if (!ogrId || !tur || !tarih || !kategori) {
      hataEl.textContent = "Öğrenci, tür, tarih ve kategori zorunludur.";
      hataEl.classList.remove("d-none");
      return;
    }

    document.getElementById("kaydet-metin").classList.add("d-none");
    document.getElementById("kaydet-yuklen").classList.remove("d-none");
    document.getElementById("kaydet-btn").disabled = true;

    try {
      await davranisEkle(ogrId, { tur, tarih, kategori, aciklama });
      basariEl.textContent = "Davranış kaydedildi.";
      basariEl.classList.remove("d-none");
      // Formu temizle
      document.getElementById("ogr-ara").value = "";
      document.getElementById("secili-ogr-id").value = "";
      document.getElementById("secili-ogr-bilgi").classList.add("d-none");
      document.getElementById("d-aciklama").value = "";
      document.getElementById("d-kategori").value = "";
    } catch (err) {
      hataEl.textContent = "Kayıt hatası: " + err.message;
      hataEl.classList.remove("d-none");
    } finally {
      document.getElementById("kaydet-metin").classList.remove("d-none");
      document.getElementById("kaydet-yuklen").classList.add("d-none");
      document.getElementById("kaydet-btn").disabled = false;
    }
  }
</script>
</body>
</html>
