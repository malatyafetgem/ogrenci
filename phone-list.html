<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toplu Telefon Listesi — ÖBS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="/ogrenci/assets/css/app.css">
  <style>
    @media print {
      .card-header, .no-print { display: none !important; }
      table { font-size: 11px !important; }
      .print-baslik { display: block !important; text-align: center; margin-bottom: 1rem; }
    }
    .print-baslik { display: none; }
  </style>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Toplu Telefon Listesi</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="/ogrenci/dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Telefon Listesi</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <!-- Filtre -->
        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Tüm Sınıflar</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Cinsiyet</label>
                <select id="filtre-cinsiyet" class="form-select form-select-sm">
                  <option value="">Tümü</option>
                  <option>Erkek</option><option>Kız</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Yatılılık</label>
                <select id="filtre-yatililik" class="form-select form-select-sm">
                  <option value="">Tümü</option>
                  <option>Gündüzlü</option>
                  <option>Paralı Yatılı</option>
                  <option>Parasız Yatılı</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <button id="filtre-uygula" class="btn btn-sm btn-primary">
                  <i class="bi bi-search me-1"></i>Uygula
                </button>
                <button id="filtre-temizle" class="btn btn-sm btn-outline-secondary ms-1">
                  <i class="bi bi-x"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">
              <i class="bi bi-telephone-fill me-1"></i>Telefon Listesi
              <span class="badge bg-secondary ms-1" id="kayit-sayisi">—</span>
            </h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" onclick="window.print()">
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <!-- Yazdırma başlığı -->
            <div class="print-baslik p-3">
              <h5>Malatya FETGEM — Öğrenci Telefon Listesi</h5>
              <div id="print-sinif-bilgi" class="text-muted"></div>
            </div>

            <div id="yukleniyor" class="text-center py-4 text-muted">
              <div class="spinner-border text-primary mb-2"></div><div>Yükleniyor...</div>
            </div>
            <div class="table-responsive d-none" id="tablo-kap">
              <table id="telefon-tablo" class="table table-sm table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>No</th>
                    <th>Ad Soyad</th>
                    <th>Sınıf</th>
                    <th>Baba Adı</th>
                    <th>Baba Tel</th>
                    <th>Anne Adı</th>
                    <th>Anne Tel</th>
                  </tr>
                </thead>
                <tbody id="telefon-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
  import { requireAuth } from "/ogrenci/assets/js/core/auth.js";
  import { layoutYukle } from "/ogrenci/assets/js/ui/layout.js";
  import { tumOgrencileriGetir, siniflarGetir, velileriGetir } from "/ogrenci/assets/js/data/students.js";

  let tumVerisi = [];
  let dt = null;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await siniflarGetir();
    const sel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => { const o = document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o); });

    document.getElementById("filtre-uygula").addEventListener("click", yukle);
    document.getElementById("filtre-temizle").addEventListener("click", () => {
      ["filtre-sinif","filtre-cinsiyet","filtre-yatililik"].forEach(id => document.getElementById(id).value = "");
      yukle();
    });
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
    await yukle();
  });

  async function yukle() {
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    const filtSinif    = document.getElementById("filtre-sinif").value;
    const filtCinsiyet = document.getElementById("filtre-cinsiyet").value;
    const filtYatililik= document.getElementById("filtre-yatililik").value;

    const ogrenciler = await tumOgrencileriGetir();
    tumVerisi = [];

    for (const ogr of ogrenciler) {
      if (filtSinif     && ogr.sinif     !== filtSinif)     continue;
      if (filtCinsiyet  && ogr.cinsiyet  !== filtCinsiyet)  continue;
      if (filtYatililik && ogr.yatililik !== filtYatililik) continue;

      const veliler = await velileriGetir(ogr.id);
      const baba = veliler.find(v => v.tur === "Baba") || {};
      const anne = veliler.find(v => v.tur === "Anne") || {};

      tumVerisi.push({
        no: ogr.numara || ogr.id,
        tamAd: `${ogr.ad} ${ogr.soyad}`.trim(),
        sinif: ogr.sinif || "",
        ogrId: ogr.id,
        babaAd: `${baba.ad||""} ${baba.soyad||""}`.trim(),
        babaTel: baba.telefon || "",
        anneAd: `${anne.ad||""} ${anne.soyad||""}`.trim(),
        anneTel: anne.telefon || ""
      });
    }

    // Sınıfa göre sırala, sonra ada göre
    tumVerisi.sort((a, b) => a.sinif.localeCompare(b.sinif) || a.tamAd.localeCompare(b.tamAd));

    document.getElementById("kayit-sayisi").textContent = tumVerisi.length;

    const sinifBilgi = filtSinif ? `${filtSinif} Sınıfı` : "Tüm Sınıflar";
    document.getElementById("print-sinif-bilgi").textContent = sinifBilgi;

    const tbody = document.getElementById("telefon-tbody");
    tbody.innerHTML = tumVerisi.length === 0
      ? `<tr><td colspan="7" class="text-center text-muted py-3">Kayıt bulunamadı.</td></tr>`
      : tumVerisi.map(r => `<tr>
          <td>${r.no}</td>
          <td><a href="/ogrenci/pages/students/detail.html?id=${r.ogrId}" class="text-decoration-none fw-semibold">${r.tamAd}</a></td>
          <td>${r.sinif}</td>
          <td>${r.babaAd || "—"}</td>
          <td>${r.babaTel || "—"}</td>
          <td>${r.anneAd || "—"}</td>
          <td>${r.anneTel || "—"}</td>
        </tr>`).join("");

    if (tumVerisi.length > 0) {
      dt = new DataTable("#telefon-tablo", {
        language: { search: "Ara:", info: "_TOTAL_ kayıt",
          paginate: { next: "İleri", previous: "Geri" } },
        pageLength: 50, order: [[2, "asc"], [1, "asc"]]
      });
    }

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function excelExport() {
    const satirlar = tumVerisi.map(r => ({
      "No": r.no, "Ad Soyad": r.tamAd, "Sınıf": r.sinif,
      "Baba Adı": r.babaAd, "Baba Tel": r.babaTel,
      "Anne Adı": r.anneAd, "Anne Tel": r.anneTel
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Telefon Listesi");
    XLSX.writeFile(wb, `telefon_listesi_${new Date().toISOString().slice(0,10)}.xlsx`);
  }
</script>
</body>
</html>
