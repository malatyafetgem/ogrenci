<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#D9542B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Toplu Telefon Listesi</title>

          crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.0/css/dataTables.bootstrap5.min.css"

</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Toplu Telefon Listesi</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Telefon Listesi</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <!-- Filtre -->
        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Cinsiyet</label>
                <select id="filtre-cinsiyet" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Erkek</option><option>Kız</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Yatılılık</label>
                <select id="filtre-yatililik" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Gündüzlü</option>
                  <option>Paralı Yatılı</option>
                  <option>Parasız Yatılı</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1">Durum</label>
                <select id="filtre-durum" class="form-select form-select-sm">
                  <option value="">Tümü</option>
                  <option value="Aktif">Aktif</option>
                  <option value="Mezun">Mezun</option>
                </select>
              </div>
              <div class="col-12 col-md-3">
                <button id="filtre-uygula" class="btn btn-sm btn-primary">
                  <i class="bi bi-search me-1"></i>Uygula
                </button>
                <button id="filtre-temizle" class="btn btn-sm btn-outline-secondary ms-1" type="button" aria-label="Telefon listesi filtrelerini temizle">
                  <i class="bi bi-x"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">
              <i class="bi bi-telephone-fill me-1"></i>Telefon Listesi
              <span class="badge bg-secondary ms-1" id="kayit-sayisi">0</span>
            </h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" data-obs-print>
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <!-- Yazdırma başlığı -->
            <div class="print-baslik p-3">
              <h5>Malatya FETGEM — Öğrenci Telefon Listesi</h5>
              <div id="print-sinif-bilgi" class="text-muted">Filtre bekleniyor</div>
            </div>

            <div id="yukleniyor" class="text-center py-4 text-muted d-none">
              <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
            </div>
            <div class="table-responsive" id="tablo-kap">
              <table id="telefon-tablo" class="table table-sm table-hover mb-0 table-fit-desktop print-landscape print-nowrap">
                <thead class="table-light">
                  <tr>
                    <th>No</th>
                    <th>Ad Soyad</th>
                    <th>Sınıf</th>
                    <th>Öğrenci Tel</th>
                    <th>Baba Adı</th>
                    <th>Baba Tel</th>
                    <th>Anne Adı</th>
                    <th>Anne Tel</th>
                  </tr>
                </thead>
                <tbody id="telefon-tbody">
                  <tr><td colspan="8" class="text-center text-muted py-3">Filtreleri seçip Uygula'ya basın.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"
        integrity="sha384-+4p7LDsv7qv4DpdBj3wITizBeFFK5pEwCMHKkmWRepY1L4SzbJD1DKvVWOlFvqMQ"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/datatables.net@2.3.0/js/dataTables.min.js"
        integrity="sha384-ehaRe3xJ0fffAlDr3p72vNw3wWV01C1/Z19X6s//i6hiF8hee+c+rabqObq8YlOk"
        crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.0/js/dataTables.bootstrap5.min.js"
          integrity="sha384-G85lmdZCo2WkHaZ8U1ZceHekzKcg37sFrs4St2+u/r2UtfvSDQmQrkMsEx4Cgv/W"
          crossorigin="anonymous"></script>
<script src="datatable-fallback.js?v=20260604-74"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
        integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw"
        crossorigin="anonymous"></script>

<script type="module">
  import { requireAuth } from "./auth.js?v=20260604-74";
  import { layoutYukle } from "./layout.js?v=20260604-74";
  import { tumOgrencileriDurumlariylaGetir, tumSiniflariGetir, tumVelileriGetir } from "./students.js?v=20260604-74";
  import {
    compareSinif, compareOgrenciNo, sinifSiralamaAnahtari, ogrenciNoSiralamaAnahtari,
    escapeHtml, escapeAttr, formatTelefon
  } from "./utils.js?v=20260604-74";

  let tumVerisi = [];
  let dt = null;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await tumSiniflariGetir();
    const sel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => { const o = document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o); });

    document.getElementById("filtre-uygula").addEventListener("click", yukle);
    document.getElementById("filtre-temizle").addEventListener("click", () => {
      ["filtre-sinif","filtre-cinsiyet","filtre-yatililik","filtre-durum"].forEach(id => document.getElementById(id).value = "");
      tabloBekle();
    });
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
    tabloBekle();
  });

  function tabloBekle() {
    if (dt) { dt.destroy(); dt = null; }
    tumVerisi = [];
    document.getElementById("kayit-sayisi").textContent = "0";
    document.getElementById("print-sinif-bilgi").textContent = "Filtre bekleniyor";
    document.getElementById("telefon-tbody").innerHTML =
      `<tr><td colspan="8" class="text-center text-muted py-3">Filtreleri seçip Uygula'ya basın.</td></tr>`;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function iskeletGoster() {
    if (dt) { dt.destroy(); dt = null; }
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
    const satir = `<tr>${Array.from({ length: 8 }).map(() => `<td><div class="skeleton skeleton-satir"></div></td>`).join("")}</tr>`;
    document.getElementById("telefon-tbody").innerHTML = satir.repeat(8);
  }

  async function yukle() {
    iskeletGoster();
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    const filtSinif    = document.getElementById("filtre-sinif").value;
    const filtCinsiyet = document.getElementById("filtre-cinsiyet").value;
    const filtYatililik= document.getElementById("filtre-yatililik").value;
    const filtDurum    = document.getElementById("filtre-durum").value;

    const [ogrenciler, tumVeliler] = await Promise.all([
      tumOgrencileriDurumlariylaGetir(),
      tumVelileriGetir()
    ]);
    const velilerByOgrenci = new Map();
    tumVeliler.forEach(v => {
      if (!velilerByOgrenci.has(v.ogrenciId)) velilerByOgrenci.set(v.ogrenciId, []);
      velilerByOgrenci.get(v.ogrenciId).push(v);
    });
    tumVerisi = [];

    for (const ogr of ogrenciler) {
      if (filtSinif     && ogr.sinif     !== filtSinif)     continue;
      if (filtCinsiyet  && ogr.cinsiyet  !== filtCinsiyet)  continue;
      if (filtYatililik && ogr.yatililik !== filtYatililik) continue;
      if (filtDurum     && (ogr.durum || "Aktif") !== filtDurum) continue;

      const veliler = velilerByOgrenci.get(ogr.id) || [];
      const baba = veliler.find(v => v.yakinlik === "Baba") || {};
      const anne = veliler.find(v => v.yakinlik === "Anne") || {};

      tumVerisi.push({
        no: ogr.numara || ogr.id,
        tamAd: `${ogr.ad} ${ogr.soyad}`.trim(),
        sinif: ogr.sinif || "",
        ogrId: ogr.id,
        ogrTel: ogr.telefon || "",
        babaAd: `${baba.ad||""} ${baba.soyad||""}`.trim(),
        babaTel: baba.telefon || "",
        anneAd: `${anne.ad||""} ${anne.soyad||""}`.trim(),
        anneTel: anne.telefon || ""
      });
    }

    tumVerisi.sort((a, b) => compareSinif(a.sinif, b.sinif) || compareOgrenciNo(a.no, b.no));

    document.getElementById("kayit-sayisi").textContent = tumVerisi.length;

    const sinifBilgi = filtSinif ? `${filtSinif} Sınıfı` : "Tüm Sınıflar";
    document.getElementById("print-sinif-bilgi").textContent = sinifBilgi;

    const tbody = document.getElementById("telefon-tbody");
    tbody.innerHTML = tumVerisi.length === 0
      ? `<tr><td colspan="8">
          <div class="bos-durum">
            <i class="bi bi-telephone-x"></i>
            <div class="baslik">Kayıt bulunamadı</div>
            <div class="aciklama">Filtreleri değiştirip tekrar deneyin.</div>
          </div></td></tr>`
      : tumVerisi.map(r => `<tr>
          <td data-order="${escapeAttr(ogrenciNoSiralamaAnahtari(r.no))}">${escapeHtml(r.no)}</td>
          <td><a href="students-detail.html?id=${escapeAttr(r.ogrId)}" class="text-decoration-none fw-semibold">${escapeHtml(r.tamAd)}</a></td>
          <td data-order="${escapeAttr(sinifSiralamaAnahtari(r.sinif))}">${escapeHtml(r.sinif)}</td>
          <td>${telLinkleri(r.ogrTel)}</td>
          <td>${escapeHtml(r.babaAd || "—")}</td>
          <td>${telLinkleri(r.babaTel)}</td>
          <td>${escapeHtml(r.anneAd || "—")}</td>
          <td>${telLinkleri(r.anneTel)}</td>
        </tr>`).join("");

    if (tumVerisi.length > 0) {
      dt = new DataTable("#telefon-tablo", {
        language: {
          search: "Ara:", lengthMenu: "_MENU_ kayıt göster",
          info: "_TOTAL_ kayıt içinden _START_–_END_",
          infoEmpty: "Kayıt yok", zeroRecords: "Bulunamadı",
          emptyTable: "Kayıt yok",
          paginate: { next: "İleri", previous: "Geri" }
        },
        pageLength: 50, order: [[2, "asc"], [0, "asc"]]
      });
    }

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function telLinkleri(tel) {
    const ham = String(tel || "").replace(/\D/g, "");
    if (!ham) return "—";
    let ulusal = ham;
    if (ham.length === 11 && ham.startsWith("0")) ulusal = ham.slice(1);
    else if (ham.length === 10) ulusal = ham;
    else ulusal = ham.replace(/^0/, "");
    const wa = "90" + ulusal;
    const telHref = "tel:+90" + ulusal;
    return `<span class="tel-hucre">
      <span class="tel-no">${escapeHtml(formatTelefon(tel))}</span>
      <a href="${telHref}" class="tel-ikon no-print" title="Ara" aria-label="Telefonla ara"><i class="bi bi-telephone-fill"></i></a>
      <a href="https://wa.me/${wa}" target="_blank" rel="noopener" class="tel-ikon wa no-print" title="WhatsApp ile yaz" aria-label="WhatsApp ile yaz"><i class="bi bi-whatsapp"></i></a>
    </span>`;
  }

  function excelExport() {
    const satirlar = tumVerisi.map(r => ({
      "No": r.no, "Ad Soyad": r.tamAd, "Sınıf": r.sinif,
      "Öğrenci Tel": r.ogrTel,
      "Baba Adı": r.babaAd, "Baba Tel": r.babaTel,
      "Anne Adı": r.anneAd, "Anne Tel": r.anneTel
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Telefon Listesi");
    XLSX.writeFile(wb, `telefon_listesi_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

</script>
</body>
</html>
