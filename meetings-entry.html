<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest?v=20260604-74">
  <meta name="theme-color" content="#D9542B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Öğrenci Bilgileri">
  <link rel="apple-touch-icon" href="apple-touch-icon-180.png?v=20260604-74">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260604-74">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=20260604-74">
  <link rel="shortcut icon" href="favicon.ico?v=20260604-74">
  <script src="file-redirect.js?v=20260604-74"></script>
  <script src="pwa.js?v=20260604-74"></script>
  <title>Veli Görüşmesi Gir</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css"
          integrity="sha384-9NjeuSnOx7U3Syj2WHHA8CjNMipUXl8AeHlvaLeK0j45IonjPwvvcsbC99v7+VVi"
          crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
          crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css"
          integrity="sha384-RkASv+6KfBMW9eknReJIJ6b3UnjKOKC5bOUaNgIY778NFbQ8MtWq9Lr/khUgqtTt"
          crossorigin="anonymous">
  <link rel="stylesheet" href="app.css?v=20260604-74">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Veli Görüşmesi Gir</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Görüşme Gir</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">
        <div class="card gorusme-form-card">
          <div class="card-body">
            <div id="hata-mesaji" class="alert alert-danger d-none"></div>
            <div id="basari-mesaji" class="alert alert-success d-none"></div>

            <div class="row g-3">
              <!-- Öğrenci -->
              <div class="col-12">
                <label class="form-label">Öğrenci <span class="text-danger">*</span></label>
                <div class="position-relative">
                  <input type="text" class="form-control" id="ogr-ara"
                         placeholder="Ad, soyad veya numara..." autocomplete="off">
                  <div id="ara-sonuclar" class="ac-dropdown d-none"></div>
                </div>
                <input type="hidden" id="secili-ogr-id">
                <div id="secili-ogr-bilgi" class="mt-1 d-none">
                  <span class="badge bg-primary" id="secili-ogr-ad"></span>
                </div>
              </div>

              <!-- Tarih -->
              <div class="col-md-4">
                <label class="form-label">Görüşme Tarihi <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="g-tarih" placeholder="GG.AA.YYYY">
              </div>

              <!-- Veli -->
              <div class="col-md-4">
                <label class="form-label">Veli <span class="text-danger">*</span></label>
                <select class="form-select" id="g-veli-tur">
                  <option value="">Seçin</option>
                </select>
              </div>

              <!-- Veli adı -->
              <div class="col-md-4">
                <label class="form-label">Veli Adı</label>
                <input type="text" class="form-control" id="g-veli-adi"
                       placeholder="Otomatik dolabilir">
              </div>

              <!-- Konu -->
              <div class="col-12">
                <label class="form-label">Görüşme Konusu <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="g-konu"
                       list="konu-list" autocomplete="off"
                       placeholder="Örn: Devamsızlık, Başarı Durumu...">
                <datalist id="konu-list"></datalist>
              </div>

              <!-- Açıklama -->
              <div class="col-12">
                <label class="form-label">Açıklama / Notlar</label>
                <textarea class="form-control" id="g-aciklama" rows="4"
                          placeholder="Görüşme özeti..."></textarea>
              </div>

              <div class="col-12">
                <button type="button" class="btn btn-primary w-100" id="kaydet-btn">
                  <span id="kaydet-metin"><i class="bi bi-save me-1"></i>Kaydet</span>
                  <span id="kaydet-yuklen" class="d-none">
                    <span class="spinner-border spinner-border-sm me-1"></span>Kaydediliyor...
                  </span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"
        integrity="sha384-+4p7LDsv7qv4DpdBj3wITizBeFFK5pEwCMHKkmWRepY1L4SzbJD1DKvVWOlFvqMQ"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"
        integrity="sha384-5JqMv4L/Xa0hfvtF06qboNdhvuYXUku9ZrhZh3bSk8VXF0A/RuSLHpLsSV9Zqhl6"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/tr.js"
        integrity="sha384-Y7O43PM3w1lzpD9Tbq06VLD7WvMJZsaVsjXBZ4rAzAPqUdizcCJYmImbIXN6f2+r"
        crossorigin="anonymous"></script>

<script type="module">
  import { requireAdmin } from "./auth.js?v=20260604-74";
  import { layoutYukle } from "./layout.js?v=20260604-74";
  import { tumOgrencileriGetir, velileriGetir, gorusmeEkle } from "./students.js?v=20260604-74";
  import { formatMetin, formatAd, escapeHtml, escapeAttr } from "./utils.js?v=20260604-74";
  import { autocompleteYukle, autocompleteGuncelle } from "./autocomplete.js?v=20260604-74";

  let tumOgrenciler = [];
  let seciliOgrVeliler = [];

  requireAdmin(async () => {
    layoutYukle();
    try {
      tumOgrenciler = await tumOgrencileriGetir();

      // Konu autocomplete
      const konular = await autocompleteYukle("gorusme_konular");
      const konuList = document.getElementById("konu-list");
      konular.forEach(k => { const o = document.createElement("option"); o.value = k; konuList.appendChild(o); });
    } catch (err) {
      document.querySelector(".app-content .container-fluid").innerHTML =
        `<div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Veriler yüklenemedi. Bağlantınızı kontrol edip tekrar deneyin.
          <div class="small text-muted mt-1">${err.message}</div>
        </div>`;
      return;
    }

    flatpickr("#g-tarih", { locale: "tr", dateFormat: "d.m.Y", defaultDate: "today" });
    baglayici();

    // URL'den öğrenci gelebilir
    const params = new URLSearchParams(location.search);
    const ogrId = params.get("id");
    if (ogrId) {
      const ogr = tumOgrenciler.find(o => o.id === ogrId);
      if (ogr) await ogrenciSec(ogr);
    }
  });

  async function ogrenciSec(ogr) {
    document.getElementById("ogr-ara").value = `${ogr.ad} ${ogr.soyad}`;
    document.getElementById("secili-ogr-id").value = ogr.id;
    document.getElementById("secili-ogr-ad").textContent = `${ogr.ad} ${ogr.soyad} · ${ogr.sinif}`;
    document.getElementById("secili-ogr-bilgi").classList.remove("d-none");
    document.getElementById("ara-sonuclar").classList.add("d-none");
    seciliOgrVeliler = (await velileriGetir(ogr.id)).filter(aktifVeliMi);
    veliSecenekleriniDoldur();
  }

  function aktifVeliMi(v) {
    const durum = v.durum || "Aktif";
    return durum === "Aktif";
  }

  function veliSecenekleriniDoldur() {
    const select = document.getElementById("g-veli-tur");
    select.innerHTML = `<option value="">Seçin</option>`;
    if (seciliOgrVeliler.length) {
      select.innerHTML += seciliOgrVeliler.map(v => {
        const yakinlik = v.yakinlik || "Veli";
        const ad = `${v.ad || ""} ${v.soyad || ""}`.trim();
        const ek = [v.birincil ? "Birincil" : "", v.acil_kisi ? "Acil" : ""].filter(Boolean).join(" / ");
        const metin = [yakinlik, ad, ek].filter(Boolean).join(" - ");
        return `<option value="${escapeAttr(v.id)}">${escapeHtml(metin)}</option>`;
      }).join("");
    } else {
      select.innerHTML += ["Anne", "Baba", "Vasi", "Diğer"]
        .map(tur => `<option value="tur:${escapeAttr(tur)}">${escapeHtml(tur)}</option>`)
        .join("");
    }
  }

  function baglayici() {
    const araEl = document.getElementById("ogr-ara");
    const sonucEl = document.getElementById("ara-sonuclar");

    araEl.addEventListener("input", () => {
      const q = araEl.value.trim().toLowerCase();
      if (q.length < 2) { sonucEl.classList.add("d-none"); return; }
      const eslesen = tumOgrenciler.filter(o =>
        `${o.ad} ${o.soyad} ${o.numara}`.toLowerCase().includes(q)).slice(0, 8);
      if (!eslesen.length) { sonucEl.classList.add("d-none"); return; }
      sonucEl.innerHTML = eslesen.map(o =>
        `<div class="ac-item" data-id="${escapeAttr(o.id)}">
          <strong>${escapeHtml(`${o.ad || ""} ${o.soyad || ""}`.trim())}</strong>
          <span class="text-muted ms-2 small">${escapeHtml(o.sinif || "")} · No: ${escapeHtml(o.numara || o.id)}</span>
        </div>`).join("");
      sonucEl.classList.remove("d-none");
      sonucEl.querySelectorAll(".ac-item").forEach(el =>
        el.addEventListener("click", async () => {
          const ogr = tumOgrenciler.find(o => o.id === el.dataset.id);
          await ogrenciSec(ogr);
        })
      );
    });
    document.addEventListener("click", e => { if (!araEl.contains(e.target)) sonucEl.classList.add("d-none"); });

    document.getElementById("g-veli-tur").addEventListener("change", () => {
      const secim = document.getElementById("g-veli-tur").value;
      const veli = seciliOgrVeliler.find(v => v.id === secim);
      document.getElementById("g-veli-adi").value = veli
        ? `${veli.ad || ""} ${veli.soyad || ""}`.trim()
        : "";
    });

    document.getElementById("kaydet-btn").addEventListener("click", kaydet);
  }

  async function kaydet() {
    const ogrId   = document.getElementById("secili-ogr-id").value;
    const tarih   = document.getElementById("g-tarih").value.trim();
    const veliSecim = document.getElementById("g-veli-tur").value;
    const seciliVeli = seciliOgrVeliler.find(v => v.id === veliSecim);
    const veliYakinlik = seciliVeli ? (seciliVeli.yakinlik || "Veli") : veliSecim.replace(/^tur:/, "");
    const veliAdi = document.getElementById("g-veli-adi").value.trim();
    const konu    = document.getElementById("g-konu").value.trim();
    const aciklama= document.getElementById("g-aciklama").value.trim();
    const hataEl  = document.getElementById("hata-mesaji");
    const basariEl= document.getElementById("basari-mesaji");

    hataEl.classList.add("d-none");
    basariEl.classList.add("d-none");

    if (!ogrId || !tarih || !veliYakinlik || !konu) {
      hataEl.textContent = "Öğrenci, tarih, veli ve konu zorunludur.";
      hataEl.classList.remove("d-none");
      return;
    }

    document.getElementById("kaydet-metin").classList.add("d-none");
    document.getElementById("kaydet-yuklen").classList.remove("d-none");
    document.getElementById("kaydet-btn").disabled = true;

    try {
      await gorusmeEkle(ogrId, {
        tarih,
        veli_id: seciliVeli?.id || "",
        veli_yakinlik: veliYakinlik,
        veli_adi: formatAd(veliAdi || `${seciliVeli?.ad || ""} ${seciliVeli?.soyad || ""}`.trim()),
        konu: formatMetin(konu),
        aciklama
      });
      await autocompleteGuncelle("gorusme_konular", konu);
      basariEl.textContent = "Görüşme kaydedildi.";
      basariEl.classList.remove("d-none");
      document.getElementById("g-konu").value = "";
      document.getElementById("g-aciklama").value = "";
      document.getElementById("g-veli-tur").value = "";
      document.getElementById("g-veli-adi").value = "";
    } catch (err) {
      hataEl.textContent = "Kayıt hatası: " + err.message;
      hataEl.classList.remove("d-none");
    } finally {
      document.getElementById("kaydet-metin").classList.remove("d-none");
      document.getElementById("kaydet-yuklen").classList.add("d-none");
      document.getElementById("kaydet-btn").disabled = false;
    }
  }
</script>
</body>
</html>
