          integrity="sha384-RkASv+6KfBMW9eknReJIJ6b3UnjKOKC5bOUaNgIY778NFbQ8MtWq9Lr/khUgqtTt"

</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Görüşme Listesi</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Görüşme Listesi</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1" for="filtre-sinif">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-veli">Yakınlık</label>
                <select id="filtre-veli" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Anne</option><option>Baba</option><option>Vasi</option>
                  <option>Üvey Anne</option><option>Üvey Baba</option>
                  <option>Dede</option><option>Nine</option><option>Abi</option><option>Abla</option>
                  <option>Koruyucu Aile</option><option>Diğer</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-bas">Tarih Başlangıç</label>
                <input type="text" class="form-control form-control-sm" id="filtre-bas">
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-bit">Tarih Bitiş</label>
                <input type="text" class="form-control form-control-sm" id="filtre-bit">
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-konu">Konu</label>
                <input type="text" class="form-control form-control-sm" id="filtre-konu" list="konu-list" placeholder="Ara...">
                <datalist id="konu-list"></datalist>
              </div>
              <div class="col-6 col-md-2">
                <button id="filtre-uygula" class="btn btn-sm btn-primary w-100" type="button" aria-label="Görüşme filtrelerini filtrele"><i class="bi bi-search me-1"></i>Filtrele</button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">
              <i class="bi bi-chat-dots me-1"></i>Görüşmeler
              <span class="badge bg-secondary ms-1" id="kayit-sayisi">0</span>
            </h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" data-obs-print>
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
              <a href="meetings-entry.html" class="btn btn-sm btn-primary">
                <i class="bi bi-plus-circle me-1"></i>Yeni Görüşme
              </a>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="yukleniyor" class="text-center py-4 text-muted d-none">
              <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
            </div>
            <div class="table-responsive" id="tablo-kap">
              <table id="gorusme-tablo" class="table table-sm table-hover mb-0 table-fit-desktop print-landscape print-nowrap">
                <thead class="table-light">
                  <tr>
                    <th>Tarih</th><th>Öğrenci</th><th>Sınıf</th>
                    <th>Veli</th><th>Veli Adı</th><th>Konu</th><th>Açıklama</th>
                  </tr>
                </thead>
                <tbody id="gorusme-tbody">
                  <tr><td colspan="7" class="text-center text-muted py-3">Filtreleri seçip Filtrele'ye basın.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"
        integrity="sha384-+4p7LDsv7qv4DpdBj3wITizBeFFK5pEwCMHKkmWRepY1L4SzbJD1DKvVWOlFvqMQ"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/datatables.net@2.3.0/js/dataTables.min.js"
        integrity="sha384-ehaRe3xJ0fffAlDr3p72vNw3wWV01C1/Z19X6s//i6hiF8hee+c+rabqObq8YlOk"
        crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.0/js/dataTables.bootstrap5.min.js"
          integrity="sha384-G85lmdZCo2WkHaZ8U1ZceHekzKcg37sFrs4St2+u/r2UtfvSDQmQrkMsEx4Cgv/W"
          crossorigin="anonymous"></script>
<script src="datatable-fallback.js?v=20260608-104"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"
        integrity="sha384-5JqMv4L/Xa0hfvtF06qboNdhvuYXUku9ZrhZh3bSk8VXF0A/RuSLHpLsSV9Zqhl6"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/tr.js"
        integrity="sha384-Y7O43PM3w1lzpD9Tbq06VLD7WvMJZsaVsjXBZ4rAzAPqUdizcCJYmImbIXN6f2+r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
        integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw"
        crossorigin="anonymous"></script>

<script type="module">
  import { requireAuth } from "./auth.js?v=20260608-104";
  import { layoutYukle } from "./layout.js?v=20260608-104";
  import { tumOgrencileriGetir, siniflarGetir, sinifaGoreGorusmeleriGetir } from "./students.js?v=20260608-104";
  import { autocompleteYukle } from "./autocomplete.js?v=20260608-104";
  import { tarihtenDate, tarihSiralamaAnahtari, sinifSiralamaAnahtari, compareTarihDesc, escapeHtml, escapeAttr, toast } from "./utils.js?v=20260608-104";

  let raporVerisi = [];
  let dt = null;
  let filtreUygulandi = false;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await siniflarGetir();
    const sel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => { const o = document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o); });

    const konular = await autocompleteYukle("gorusme_konular");
    const kl = document.getElementById("konu-list");
    konular.forEach(k => { const o=document.createElement("option"); o.value=k; kl.appendChild(o); });

    flatpickr("#filtre-bas", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });
    flatpickr("#filtre-bit", { locale: "tr", dateFormat: "d.m.Y", allowInput: true });
    document.getElementById("filtre-uygula").addEventListener("click", yukle);
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
    tabloBekle();
  });

  function tabloBekle() {
    if (dt) { dt.destroy(); dt = null; }
    raporVerisi = [];
    filtreUygulandi = false;
    document.getElementById("kayit-sayisi").textContent = "0";
    document.getElementById("gorusme-tbody").innerHTML =
      `<tr><td colspan="7" class="text-center text-muted py-3">Filtreleri seçip Filtrele'ye basın.</td></tr>`;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function iskeletGoster() {
    if (dt) { dt.destroy(); dt = null; }
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
    const satir = `<tr>${Array.from({ length: 7 }).map(() => `<td><div class="skeleton skeleton-satir"></div></td>`).join("")}</tr>`;
    document.getElementById("gorusme-tbody").innerHTML = satir.repeat(7);
  }

  async function yukle() {
    iskeletGoster();
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    const filtSinif = document.getElementById("filtre-sinif").value;
    const filtVeli  = document.getElementById("filtre-veli").value;
    const filtBas   = document.getElementById("filtre-bas").value;
    const filtBit   = document.getElementById("filtre-bit").value;
    const filtKonu  = document.getElementById("filtre-konu").value.trim().toLowerCase();

    const [ogrenciler, tumKayitlar] = await Promise.all([
      tumOgrencileriGetir(),
      sinifaGoreGorusmeleriGetir(filtSinif)
    ]);
    const ogrById = new Map(ogrenciler.map(ogr => [ogr.id, ogr]));
    raporVerisi = [];

    tumKayitlar.forEach(g => {
      const ogr = ogrById.get(g.ogrenciId);
      if (!ogr) return;
      if (filtSinif && ogr.sinif !== filtSinif) return;
      if (filtVeli && g.veli_yakinlik !== filtVeli) return;
      if (filtKonu && !(g.konu || "").toLowerCase().includes(filtKonu)) return;
      if (filtBas || filtBit) {
        const t = tarihtenDate(g.tarih);
        if (!t) return;
        if (filtBas && t < tarihtenDate(filtBas)) return;
        if (filtBit && t > tarihtenDate(filtBit)) return;
      }
      raporVerisi.push({ ogr, ...g });
    });

    raporVerisi.sort((a, b) => compareTarihDesc(a.tarih, b.tarih));
    document.getElementById("kayit-sayisi").textContent = raporVerisi.length;

    const tbody = document.getElementById("gorusme-tbody");
    tbody.innerHTML = raporVerisi.length === 0
      ? `<tr><td colspan="7">
          <div class="bos-durum">
            <i class="bi bi-chat-dots"></i>
            <div class="baslik">Kayıt bulunamadı</div>
            <div class="aciklama">Filtreleri değiştirip tekrar deneyin.</div>
          </div></td></tr>`
      : raporVerisi.map(g => `<tr>
          <td data-order="${escapeAttr(tarihSiralamaAnahtari(g.tarih))}">${escapeHtml(g.tarih || "—")}</td>
          <td><a href="students-detail.html?id=${escapeAttr(g.ogr.id)}" class="text-decoration-none">
            ${escapeHtml(`${g.ogr.ad || ""} ${g.ogr.soyad || ""}`.trim())}</a></td>
          <td data-order="${escapeAttr(sinifSiralamaAnahtari(g.ogr.sinif))}">${escapeHtml(g.ogr.sinif || "—")}</td>
          <td><span class="badge bg-secondary">${escapeHtml(g.veli_yakinlik || "—")}</span></td>
          <td>${escapeHtml(g.veli_adi || "—")}</td>
          <td>${escapeHtml(g.konu || "—")}</td>
          <td class="small text-muted">${escapeHtml(g.aciklama || "—")}</td>
        </tr>`).join("");

    if (raporVerisi.length > 0) {
      dt = new DataTable("#gorusme-tablo", {
        language: {
          search: "Ara:", lengthMenu: "_MENU_ kayıt göster",
          info: "_TOTAL_ kayıt içinden _START_–_END_",
          infoEmpty: "Kayıt yok", zeroRecords: "Bulunamadı",
          emptyTable: "Kayıt yok",
          paginate: { next: "İleri", previous: "Geri" }
        },
        pageLength: 25, order: [[0, "desc"]]
      });
    }

    filtreUygulandi = true;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function excelExport() {
    if (!filtreUygulandi) {
      toast("Önce filtreleri seçip Filtrele'ye basın.", "warning");
      return;
    }
    if (!raporVerisi.length) {
      toast("Excel'e aktarılacak kayıt yok.", "warning");
      return;
    }
    const satirlar = raporVerisi.map(g => ({
      "Tarih": g.tarih, "Ad": g.ogr.ad, "Soyad": g.ogr.soyad, "Sınıf": g.ogr.sinif,
      "Yakınlık": g.veli_yakinlik, "Veli Adı": g.veli_adi,
      "Konu": g.konu, "Açıklama": g.aciklama
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Görüşmeler");
    XLSX.writeFile(wb, `gorusmeler_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

</script>
</body>
</html>
