<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veli Listesi — ÖBS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Veli Listesi</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Veli Listesi</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Tüm Sınıflar</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Veli Türü</label>
                <select id="filtre-tur" class="form-select form-select-sm">
                  <option value="">Tümü</option>
                  <option>Baba</option>
                  <option>Anne</option>
                  <option>Diğer</option>
                </select>
              </div>
              <div class="col-12 col-md-3 d-flex gap-2">
                <button id="filtre-uygula" class="btn btn-sm btn-primary">
                  <i class="bi bi-search me-1"></i>Filtrele
                </button>
                <button id="filtre-temizle" class="btn btn-sm btn-outline-secondary">
                  <i class="bi bi-x me-1"></i>Temizle
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">
              <i class="bi bi-people-fill me-1"></i>Veliler
              <span class="badge bg-secondary ms-1" id="kayit-sayisi">—</span>
            </h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" onclick="window.print()">
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="yukleniyor" class="text-center py-4 text-muted">
              <div class="spinner-border text-primary mb-2"></div><div>Yükleniyor...</div>
            </div>
            <div class="table-responsive d-none" id="tablo-kap">
              <table id="veli-tablo" class="table table-sm table-hover mb-0 align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Veli</th>
                    <th>Tür</th>
                    <th>Öğrenci</th>
                    <th>Sınıf</th>
                    <th>Telefon</th>
                    <th>E-Posta</th>
                    <th>Şehir</th>
                  </tr>
                </thead>
                <tbody id="veli-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
  import { requireAuth } from "auth.js";
  import { layoutYukle } from "layout.js";
  import { db } from "firebase-config.js";
  import {
    collection, getDocs, query, where, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { siniflarGetir } from "students.js";
  import { formatTelefon, toast } from "utils.js";

  let tumVeliler = [];
  let dt = null;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await siniflarGetir();
    const sinifSel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => {
      const o = document.createElement("option"); o.value = s; o.textContent = s;
      sinifSel.appendChild(o);
    });
    await yukle();
    baglayici();
  });

  async function yukle(sinifFiltre = "", turFiltre = "") {
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    try {
      let q = query(collection(db, "students"), where("durum", "==", "Aktif"), orderBy("soyad"));
      const ogrSnap = await getDocs(q);
      const veriListesi = [];

      for (const ogrDoc of ogrSnap.docs) {
        const ogr = ogrDoc.data();
        if (sinifFiltre && ogr.sinif !== sinifFiltre) continue;

        const veliSnap = await getDocs(collection(db, "students", ogrDoc.id, "veliler"));
        for (const veliDoc of veliSnap.docs) {
          const v = veliDoc.data();
          if (turFiltre && v.tur !== turFiltre) continue;
          veriListesi.push({
            veliAd: `${v.ad || ""} ${v.soyad || ""}`.trim(),
            tur: v.tur || "—",
            ogrAd: `${ogr.ad || ""} ${ogr.soyad || ""}`.trim(),
            ogrId: ogrDoc.id,
            sinif: ogr.sinif || "—",
            telefon: formatTelefon(v.telefon || ""),
            eposta: v.e_posta || "—",
            sehir: v.sehir || "—"
          });
        }
      }

      tumVeliler = veriListesi;
      tabloGoster(veriListesi);
    } catch (err) {
      console.error(err);
      toast("Veri yüklenemedi!", "danger");
    }
  }

  function tabloGoster(veri) {
    document.getElementById("kayit-sayisi").textContent = veri.length;
    const tbody = document.getElementById("veli-tbody");
    tbody.innerHTML = veri.length === 0
      ? `<tr><td colspan="7" class="text-center text-muted py-3">Kayıt bulunamadı.</td></tr>`
      : veri.map(v => {
          const turRenk = v.tur === "Baba" ? "primary" : v.tur === "Anne" ? "danger" : "secondary";
          return `<tr>
            <td class="fw-semibold">${v.veliAd || "—"}</td>
            <td><span class="badge bg-${turRenk}">${v.tur}</span></td>
            <td><a href="students-detail.html?id=${v.ogrId}"
                   class="text-decoration-none">${v.ogrAd}</a></td>
            <td>${v.sinif}</td>
            <td>${v.telefon || "—"}</td>
            <td>${v.eposta}</td>
            <td>${v.sehir}</td>
          </tr>`;
        }).join("");

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");

    if (veri.length > 0) {
      dt = new DataTable("#veli-tablo", {
        language: {
          search: "Ara:", info: "_TOTAL_ kayıt içinden _START_–_END_",
          zeroRecords: "Bulunamadı",
          paginate: { next: "İleri", previous: "Geri" }
        },
        pageLength: 25
      });
    }
  }

  function baglayici() {
    document.getElementById("filtre-uygula").addEventListener("click", () => {
      yukle(
        document.getElementById("filtre-sinif").value,
        document.getElementById("filtre-tur").value
      );
    });
    document.getElementById("filtre-temizle").addEventListener("click", () => {
      document.getElementById("filtre-sinif").value = "";
      document.getElementById("filtre-tur").value = "";
      yukle();
    });
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
  }

  function excelExport() {
    const satirlar = tumVeliler.map(v => ({
      "Veli Ad Soyad": v.veliAd,
      "Tür": v.tur,
      "Öğrenci": v.ogrAd,
      "Sınıf": v.sinif,
      "Telefon": v.telefon,
      "E-Posta": v.eposta,
      "Şehir": v.sehir
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Veliler");
    XLSX.writeFile(wb, `veliler_${new Date().toISOString().slice(0,10)}.xlsx`);
  }
</script>
</body>
</html>
