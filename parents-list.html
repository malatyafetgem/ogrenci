<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.webmanifest?v=20260531-36">
  <meta name="theme-color" content="#D9542B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="Öğrenci Bilgileri">
  <link rel="apple-touch-icon" href="apple-touch-icon-180.png?v=20260531-36">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260531-36">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=20260531-36">
  <link rel="shortcut icon" href="favicon.ico?v=20260531-36">
  <script src="file-redirect.js?v=20260531-36"></script>
  <script src="pwa.js?v=20260531-36"></script>
  <title>Veli Listesi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.3/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="app.css?v=20260531-36">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Veli Listesi</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Veli Listesi</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1">Yakınlık</label>
                <select id="filtre-tur" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Anne</option>
                  <option>Baba</option>
                  <option>Vasi</option>
                  <option>Üvey Anne</option>
                  <option>Üvey Baba</option>
                  <option>Dede</option>
                  <option>Nine</option>
                  <option>Abi</option>
                  <option>Abla</option>
                  <option>Koruyucu Aile</option>
                  <option>Diğer</option>
                </select>
              </div>
              <div class="col-12 col-md-3 d-flex gap-2">
                <button id="filtre-uygula" class="btn btn-sm btn-primary">
                  <i class="bi bi-search me-1"></i>Filtrele
                </button>
                <button id="filtre-temizle" class="btn btn-sm btn-outline-secondary">
                  <i class="bi bi-x me-1"></i>Temizle
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">
              <i class="bi bi-people-fill me-1"></i>Veliler
              <span class="badge bg-secondary ms-1" id="kayit-sayisi">0</span>
            </h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" data-obs-print>
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="yukleniyor" class="text-center py-4 text-muted d-none">
              <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
            </div>
            <div class="table-responsive" id="tablo-kap">
              <table id="veli-tablo" class="table table-sm table-hover mb-0 align-middle table-fit-desktop print-landscape print-nowrap">
                <thead class="table-light">
                  <tr>
                    <th>Veli</th>
                    <th>Yakınlık</th>
                    <th>Durum</th>
                    <th>Öğrenci</th>
                    <th>Sınıf</th>
                    <th>Telefon</th>
                    <th>Öncelik</th>
                    <th>İl</th>
                  </tr>
                </thead>
                <tbody id="veli-tbody">
                  <tr><td colspan="8" class="text-center text-muted py-3">Filtreleri seçip Filtrele'ye basın.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">
  import { requireAuth } from "./auth.js?v=20260531-36";
  import { layoutYukle } from "./layout.js?v=20260531-36";
  import { siniflarGetir, tumOgrencileriGetir, tumVelileriGetir } from "./students.js?v=20260531-36";
  import {
    formatTelefon, toast,
    compareOgrenci, compareSinif, compareOgrenciNo,
    sinifSiralamaAnahtari, ogrenciNoSiralamaAnahtari,
    escapeHtml, escapeAttr
  } from "./utils.js?v=20260531-36";

  let tumVeliler = [];
  let dt = null;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await siniflarGetir();
    const sinifSel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => {
      const o = document.createElement("option"); o.value = s; o.textContent = s;
      sinifSel.appendChild(o);
    });
    tabloBekle();
    baglayici();
  });

  function tabloBekle() {
    if (dt) { dt.destroy(); dt = null; }
    tumVeliler = [];
    document.getElementById("kayit-sayisi").textContent = "0";
    document.getElementById("veli-tbody").innerHTML =
      `<tr><td colspan="8" class="text-center text-muted py-3">Filtreleri seçip Filtrele'ye basın.</td></tr>`;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  async function yukle(sinifFiltre = "", turFiltre = "") {
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    try {
      const [ogrenciler, veliler] = await Promise.all([
        tumOgrencileriGetir(),
        tumVelileriGetir()
      ]);
      const ogrMap = new Map(ogrenciler.map(o => [String(o.id), o]));
      const veriListesi = veliler
        .map(v => veliSatiriOlustur(v, ogrMap.get(String(v.ogrenciId))))
        .filter(Boolean)
        .filter(v => !sinifFiltre || v.sinif === sinifFiltre)
        .filter(v => !turFiltre || v.yakinlik === turFiltre);

      tumVeliler = veriListesi.sort((a, b) =>
        compareSinif(a.sinif, b.sinif)
        || compareOgrenciNo(a.no, b.no)
        || Number(!!b.birincil) - Number(!!a.birincil)
        || (a.iletisim_sirasi || 999) - (b.iletisim_sirasi || 999)
        || yakinlikSirasi(a.yakinlik) - yakinlikSirasi(b.yakinlik)
        || a.veliAd.localeCompare(b.veliAd, "tr")
      );
      tabloGoster(tumVeliler);
    } catch (err) {
      tumVeliler = [];
      tabloGoster([]);
      toast("Veri yüklenemedi!", "danger");
    }
  }

  function veliSatiriOlustur(v, ogr) {
    if (!ogr) return null;
    const veliAd = `${v.ad || ""} ${v.soyad || ""}`.trim();
    const ogrAd = `${ogr.ad || ""} ${ogr.soyad || ""}`.trim();
    return {
      veliAd,
      yakinlik: v.yakinlik || "—",
      durum: v.durum || "Aktif",
      birincil: !!v.birincil,
      acil_kisi: !!v.acil_kisi,
      iletisim_sirasi: Number(v.iletisim_sirasi) || 0,
      ogrAd,
      no: ogr.numara || ogr.id,
      ogrId: ogr.id,
      sinif: ogr.sinif || "—",
      telefon: formatTelefon(v.telefon || ""),
      eposta: v.e_posta || "—",
      il: v.il || "—",
      meslek: [v.calisma_durumu, v.meslek_grubu, v.meslek, v.gorev_unvan, v.kurum]
        .filter(Boolean).join(" / ")
    };
  }

  function tabloGoster(veri) {
    document.getElementById("kayit-sayisi").textContent = veri.length;
    const tbody = document.getElementById("veli-tbody");
    tbody.innerHTML = veri.length === 0
      ? `<tr><td colspan="8" class="text-center text-muted py-3">Kayıt bulunamadı.</td></tr>`
      : veri.map(v => {
          const turRenk = v.yakinlik === "Baba" ? "primary" : v.yakinlik === "Anne" ? "danger" : "secondary";
          return `<tr>
            <td class="fw-semibold">${escapeHtml(v.veliAd || "—")}</td>
            <td><span class="badge bg-${turRenk}">${escapeHtml(v.yakinlik)}</span></td>
            <td>${durumRozeti(v.durum)}</td>
            <td data-order="${escapeAttr(ogrenciNoSiralamaAnahtari(v.no))}"><a href="students-detail.html?id=${escapeAttr(v.ogrId)}"
                   class="text-decoration-none">${escapeHtml(v.ogrAd)}</a></td>
            <td data-order="${escapeAttr(sinifSiralamaAnahtari(v.sinif))}">${escapeHtml(v.sinif)}</td>
            <td>${escapeHtml(v.telefon || "—")}</td>
            <td>${oncelikEtiketi(v)}</td>
            <td>${escapeHtml(v.il)}</td>
          </tr>`;
        }).join("");

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");

    if (veri.length > 0) {
      dt = new DataTable("#veli-tablo", {
        language: {
          search: "Ara:", info: "_TOTAL_ kayıt içinden _START_–_END_",
          lengthMenu: "_MENU_ kayıt göster",
          infoEmpty: "Kayıt yok", zeroRecords: "Bulunamadı",
          emptyTable: "Kayıt yok",
          paginate: { next: "İleri", previous: "Geri" }
        },
        pageLength: 25,
        order: [[4, "asc"], [3, "asc"]]
      });
    }
  }

  function baglayici() {
    document.getElementById("filtre-uygula").addEventListener("click", () => {
      yukle(
        document.getElementById("filtre-sinif").value,
        document.getElementById("filtre-tur").value
      );
    });
    document.getElementById("filtre-temizle").addEventListener("click", () => {
      document.getElementById("filtre-sinif").value = "";
      document.getElementById("filtre-tur").value = "";
      tabloBekle();
    });
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
  }

  function excelExport() {
    const satirlar = tumVeliler.map(v => ({
      "Veli Ad Soyad": v.veliAd,
      "Yakınlık": v.yakinlik,
      "Durum": v.durum,
      "Öğrenci": v.ogrAd,
      "Öğrenci No": v.no,
      "Sınıf": v.sinif,
      "Telefon": v.telefon,
      "E-Posta": v.eposta,
      "Öncelik": oncelikMetni(v),
      "İl": v.il,
      "Meslek": v.meslek
    }));
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Veliler");
    XLSX.writeFile(wb, `veliler_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  function durumRozeti(durum) {
    const renk = {
      "Aktif": "success",
      "Vefat": "dark",
      "Ulaşılamıyor": "warning text-dark",
      "Velayeti Yok": "warning text-dark",
      "Aranmasın": "danger",
      "Pasif": "secondary"
    }[durum] || "secondary";
    return `<span class="badge bg-${renk}">${escapeHtml(durum)}</span>`;
  }

  function oncelikEtiketi(v) {
    const etiketler = [];
    if (v.birincil) etiketler.push('<span class="badge text-bg-success">Birincil</span>');
    if (v.acil_kisi) etiketler.push('<span class="badge text-bg-info">Acil</span>');
    if (v.iletisim_sirasi) etiketler.push(`<span class="badge text-bg-light">Sıra ${escapeHtml(String(v.iletisim_sirasi))}</span>`);
    return etiketler.join(" ") || "—";
  }

  function oncelikMetni(v) {
    return [
      v.birincil ? "Birincil" : "",
      v.acil_kisi ? "Acil" : "",
      v.iletisim_sirasi ? `Sıra ${v.iletisim_sirasi}` : ""
    ].filter(Boolean).join(" / ");
  }

  function yakinlikSirasi(tur) {
    return {
      Anne: 1,
      Baba: 2,
      Vasi: 3,
      "Üvey Anne": 4,
      "Üvey Baba": 5,
      Dede: 6,
      Nine: 7,
      Abi: 8,
      Abla: 9,
      "Koruyucu Aile": 10,
      Diğer: 99
    }[tur] || 99;
  }

</script>
</body>
</html>
