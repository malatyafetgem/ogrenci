<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
  <div id="topbar-kap"></div>
  <div id="sidebar-kap"></div>

  <main class="app-main">
    <div class="app-content-header">
      <div class="container-fluid">
        <div class="row align-items-center">
          <div class="col-sm-6"><h3 class="mb-0">Veli Listesi</h3></div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-end">
              <li class="breadcrumb-item"><a href="dashboard.html">Panel</a></li>
              <li class="breadcrumb-item active">Veli Listesi</li>
            </ol>
          </div>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div class="container-fluid">

        <div class="card mb-3 no-print">
          <div class="card-body py-2">
            <div class="row g-2 align-items-end">
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-sinif">Sınıf</label>
                <select id="filtre-sinif" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-yatililik">Yatılılık</label>
                <select id="filtre-yatililik" class="form-select form-select-sm">
                  <option value="">Seçiniz</option>
                  <option>Gündüzlü</option>
                  <option value="Yatılı">Yatılı</option>
                  <option>Paralı Yatılı</option>
                  <option>Parasız Yatılı</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label small mb-1" for="filtre-durum">Durum</label>
                <select id="filtre-durum" class="form-select form-select-sm">
                  <option value="">Tümü</option>
                  <option value="Aktif">Aktif</option>
                  <option value="Mezun">Mezun</option>
                </select>
              </div>
              <div class="col-6 col-md-3">
                <label class="form-label small mb-1" for="filtre-tur">Yakınlık</label>
                <select id="filtre-tur" class="form-select form-select-sm">
                  <option value="">Tümü</option>
                  <option>Anne</option>
                  <option>Baba</option>
                  <option>Vasi</option>
                  <option>Üvey Anne</option>
                  <option>Üvey Baba</option>
                  <option>Dede</option>
                  <option>Nine</option>
                  <option>Abi</option>
                  <option>Abla</option>
                  <option>Koruyucu Aile</option>
                  <option>Diğer</option>
                </select>
              </div>
              <div class="col-12 col-md-3 d-flex gap-2">
                <button id="filtre-uygula" class="btn btn-sm btn-primary">
                  <i class="bi bi-search me-1"></i>Filtrele
                </button>
                <button id="filtre-temizle" class="btn btn-sm btn-outline-secondary">
                  <i class="bi bi-x me-1"></i>Temizle
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h6 class="mb-0">
              <i class="bi bi-people-fill me-1"></i>Veliler
              <span class="badge bg-secondary ms-1" id="kayit-sayisi">0</span>
            </h6>
            <div class="d-flex gap-2 no-print">
              <button class="btn btn-sm btn-success" id="excel-export-btn">
                <i class="bi bi-file-earmark-excel me-1"></i>Excel
              </button>
              <button class="btn btn-sm btn-outline-secondary" data-obs-print>
                <i class="bi bi-printer me-1"></i>Yazdır
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="yukleniyor" class="text-center py-4 text-muted d-none">
              <div class="spinner-border text-primary mb-2"></div><div>Hazırlanıyor...</div>
            </div>
            <div class="table-responsive" id="tablo-kap">
              <table id="veli-tablo" class="table table-sm table-hover mb-0 align-middle table-fit-desktop print-landscape print-nowrap">
                <thead class="table-light">
                  <tr>
                    <th>Sıra</th>
                    <th>Öğrenci No</th>
                    <th>Öğrenci Adı Soyadı</th>
                    <th>Sınıfı</th>
                    <th>1. Veli Yakınlık</th>
                    <th>1. Veli Adı Soyadı</th>
                    <th>2. Veli Yakınlık</th>
                    <th>2. Veli Adı Soyadı</th>
                  </tr>
                </thead>
                <tbody id="veli-tbody">
                  <tr><td colspan="8" class="text-center text-muted py-3">Filtreleri seçip Filtrele'ye basın.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
<div id="footer-kap"></div>
<div id="bottom-nav-kap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-beta2/dist/js/adminlte.min.js"
        integrity="sha384-+4p7LDsv7qv4DpdBj3wITizBeFFK5pEwCMHKkmWRepY1L4SzbJD1DKvVWOlFvqMQ"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/datatables.net@2.3.0/js/dataTables.min.js"
        integrity="sha384-ehaRe3xJ0fffAlDr3p72vNw3wWV01C1/Z19X6s//i6hiF8hee+c+rabqObq8YlOk"
        crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.3.0/js/dataTables.bootstrap5.min.js"
          integrity="sha384-G85lmdZCo2WkHaZ8U1ZceHekzKcg37sFrs4St2+u/r2UtfvSDQmQrkMsEx4Cgv/W"
          crossorigin="anonymous"></script>
<script src="datatable-fallback.js?v=20260604-83"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
        integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw"
        crossorigin="anonymous"></script>

<script type="module">
  import { requireAuth } from "./auth.js?v=20260604-83";
  import { layoutYukle } from "./layout.js?v=20260604-83";
  import { tumSiniflariGetir, tumOgrencileriDurumlariylaGetir, tumVelileriGetir } from "./students.js?v=20260604-83";
  import {
    toast, compareSinif, compareOgrenciNo,
    sinifSiralamaAnahtari, ogrenciNoSiralamaAnahtari,
    escapeHtml, escapeAttr
  } from "./utils.js?v=20260604-83";

  const VELI_BASLIKLARI = [
    "Sıra", "Öğrenci No", "Öğrenci Adı Soyadı", "Sınıfı",
    "1. Veli Yakınlık", "1. Veli Adı Soyadı",
    "2. Veli Yakınlık", "2. Veli Adı Soyadı",
    "3. Veli Yakınlık", "3. Veli Adı Soyadı"
  ];

  let tumSatirlar = [];
  let dt = null;
  let filtreUygulandi = false;

  requireAuth(async () => {
    layoutYukle();
    const siniflar = await tumSiniflariGetir();
    const sinifSel = document.getElementById("filtre-sinif");
    siniflar.forEach(s => {
      const o = document.createElement("option"); o.value = s; o.textContent = s;
      sinifSel.appendChild(o);
    });
    tabloBekle();
    baglayici();
  });

  function tabloBekle() {
    if (dt) { dt.destroy(); dt = null; }
    tumSatirlar = [];
    filtreUygulandi = false;
    document.getElementById("kayit-sayisi").textContent = "0";
    document.getElementById("veli-tbody").innerHTML =
      `<tr><td colspan="8" class="text-center text-muted py-3">Filtreleri seçip Filtrele'ye basın.</td></tr>`;
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
  }

  function iskeletGoster() {
    if (dt) { dt.destroy(); dt = null; }
    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");
    const satir = `<tr>${Array.from({ length: 8 }).map(() => `<td><div class="skeleton skeleton-satir"></div></td>`).join("")}</tr>`;
    document.getElementById("veli-tbody").innerHTML = satir.repeat(8);
  }

  async function yukle(filtreler = {}) {
    iskeletGoster();
    document.getElementById("yukleniyor").classList.remove("d-none");
    document.getElementById("tablo-kap").classList.add("d-none");
    if (dt) { dt.destroy(); dt = null; }

    try {
      const [ogrenciler, veliler] = await Promise.all([
        tumOgrencileriDurumlariylaGetir(),
        tumVelileriGetir()
      ]);
      const velilerByOgrenci = new Map();
      veliler.forEach(v => {
        const key = String(v.ogrenciId || "");
        if (!key) return;
        if (!velilerByOgrenci.has(key)) velilerByOgrenci.set(key, []);
        velilerByOgrenci.get(key).push(v);
      });

      const veriListesi = [];
      for (const ogr of ogrenciler) {
        if (!ogrenciFiltreyeUyar(ogr, filtreler)) continue;

        const ogrenciVelileri = veliSirala(velilerByOgrenci.get(String(ogr.id)) || []);
        const secilenVeliler = filtreler.yakinlik
          ? ogrenciVelileri.filter(v => (v.yakinlik || "") === filtreler.yakinlik)
          : ogrenciVelileri;
        if (!secilenVeliler.length) continue;

        veriListesi.push(ogrenciVeliSatiriOlustur(ogr, secilenVeliler.slice(0, 3)));
      }

      tumSatirlar = veriListesi
        .sort((a, b) => compareSinif(a.sinif, b.sinif) || compareOgrenciNo(a.no, b.no))
        .map((satir, index) => ({ ...satir, sira: index + 1 }));
      filtreUygulandi = true;
      tabloGoster(tumSatirlar);
    } catch (err) {
      tumSatirlar = [];
      tabloGoster([]);
      toast("Veri yüklenemedi: " + err.message, "danger");
    }
  }

  function ogrenciFiltreyeUyar(ogr, filtreler) {
    if (filtreler.sinif && ogr.sinif !== filtreler.sinif) return false;
    if (filtreler.durum && (ogr.durum || "Aktif") !== filtreler.durum) return false;
    if (filtreler.yatililik === "Yatılı") {
      if (ogr.yatililik !== "Paralı Yatılı" && ogr.yatililik !== "Parasız Yatılı") return false;
    } else if (filtreler.yatililik && ogr.yatililik !== filtreler.yatililik) {
      return false;
    }
    return true;
  }

  function ogrenciVeliSatiriOlustur(ogr, veliler) {
    const ogrAd = `${ogr.ad || ""} ${ogr.soyad || ""}`.trim();
    return {
      ogrAd,
      no: ogr.numara || ogr.id,
      ogrId: ogr.id,
      sinif: ogr.sinif || "—",
      veliler: veliler.map(v => ({
        yakinlik: v.yakinlik || "—",
        adSoyad: `${v.ad || ""} ${v.soyad || ""}`.trim() || "—"
      }))
    };
  }

  function veliSirala(veliler) {
    return [...veliler]
      .filter(v => v && (v.ad || v.soyad || v.yakinlik))
      .sort((a, b) =>
        Number(!!b.birincil) - Number(!!a.birincil)
        || (Number(a.iletisim_sirasi) || 999) - (Number(b.iletisim_sirasi) || 999)
        || yakinlikSirasi(a.yakinlik) - yakinlikSirasi(b.yakinlik)
        || veliAdSoyad(a).localeCompare(veliAdSoyad(b), "tr")
      );
  }

  function veliAdSoyad(v) {
    return `${v.ad || ""} ${v.soyad || ""}`.trim();
  }

  async function tabloGoster(veri) {
    document.getElementById("kayit-sayisi").textContent = veri.length;
    const tbody = document.getElementById("veli-tbody");
    tbody.innerHTML = veri.length === 0
      ? `<tr><td colspan="8">
          <div class="bos-durum">
            <i class="bi bi-person-lines-fill"></i>
            <div class="baslik">Kayıt bulunamadı</div>
            <div class="aciklama">Filtreleri değiştirip tekrar deneyin.</div>
          </div></td></tr>`
      : veri.map(satir => {
          return `<tr>
            <td data-order="${escapeAttr(String(satir.sira).padStart(4, "0"))}">${escapeHtml(satir.sira)}</td>
            <td data-order="${escapeAttr(ogrenciNoSiralamaAnahtari(satir.no))}">
              <a href="students-detail.html?id=${escapeAttr(satir.ogrId)}" class="text-decoration-none">${escapeHtml(satir.no)}</a>
            </td>
            <td><a href="students-detail.html?id=${escapeAttr(satir.ogrId)}" class="text-decoration-none fw-semibold">${escapeHtml(satir.ogrAd || "—")}</a></td>
            <td data-order="${escapeAttr(sinifSiralamaAnahtari(satir.sinif))}">${escapeHtml(satir.sinif)}</td>
            ${veliHucreleri(satir.veliler)}
          </tr>`;
        }).join("");

    document.getElementById("yukleniyor").classList.add("d-none");
    document.getElementById("tablo-kap").classList.remove("d-none");

    if (veri.length > 0) {
      dt = new DataTable("#veli-tablo", {
        language: {
          search: "Ara:", info: "_TOTAL_ kayıt içinden _START_–_END_",
          lengthMenu: "_MENU_ kayıt göster",
          infoEmpty: "Kayıt yok", zeroRecords: "Bulunamadı",
          emptyTable: "Kayıt yok",
          paginate: { next: "İleri", previous: "Geri" }
        },
        pageLength: 25,
        order: [[3, "asc"], [1, "asc"]]
      });
    }
  }

  function veliHucreleri(veliler) {
    return [0, 1].map(index => {
      const veli = veliler[index];
      if (!veli) return `<td>—</td><td>—</td>`;
      return `<td>${yakinlikEtiketi(veli.yakinlik)}</td><td>${escapeHtml(veli.adSoyad || "—")}</td>`;
    }).join("");
  }

  function baglayici() {
    document.getElementById("filtre-uygula").addEventListener("click", () => {
      yukle({
        sinif: document.getElementById("filtre-sinif").value,
        yatililik: document.getElementById("filtre-yatililik").value,
        durum: document.getElementById("filtre-durum").value,
        yakinlik: document.getElementById("filtre-tur").value
      });
    });
    document.getElementById("filtre-temizle").addEventListener("click", () => {
      document.getElementById("filtre-sinif").value = "";
      document.getElementById("filtre-yatililik").value = "";
      document.getElementById("filtre-durum").value = "";
      document.getElementById("filtre-tur").value = "";
      tabloBekle();
    });
    document.getElementById("excel-export-btn").addEventListener("click", excelExport);
  }

  function excelExport() {
    if (!filtreUygulandi) {
      toast("Önce filtreleri seçip Filtrele'ye basın.", "warning");
      return;
    }
    if (!tumSatirlar.length) {
      toast("Excel'e aktarılacak kayıt yok.", "warning");
      return;
    }
    const satirlar = tumSatirlar.map(excelSatiriOlustur);
    const ws = XLSX.utils.json_to_sheet(satirlar);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Veliler");
    XLSX.writeFile(wb, `veliler_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  function excelSatiriOlustur(satir) {
    const veri = {
      "Sıra": satir.sira,
      "Öğrenci No": satir.no,
      "Öğrenci Adı Soyadı": satir.ogrAd,
      "Sınıfı": satir.sinif
    };
    [0, 1, 2].forEach(index => {
      const veli = satir.veliler[index] || {};
      veri[`${index + 1}. Veli Yakınlık`] = veli.yakinlik || "";
      veri[`${index + 1}. Veli Adı Soyadı`] = veli.adSoyad || "";
    });
    return VELI_BASLIKLARI.reduce((sonuc, baslik) => {
      sonuc[baslik] = veri[baslik] ?? "";
      return sonuc;
    }, {});
  }

  function yakinlikEtiketi(yakinlik) {
    const renk = yakinlik === "Baba" ? "primary" : yakinlik === "Anne" ? "danger" : "secondary";
    return `<span class="badge bg-${renk}">${escapeHtml(yakinlik || "—")}</span>`;
  }

  function yakinlikSirasi(tur) {
    return {
      Anne: 1,
      Baba: 2,
      Vasi: 3,
      "Üvey Anne": 4,
      "Üvey Baba": 5,
      Dede: 6,
      Nine: 7,
      Abi: 8,
      Abla: 9,
      "Koruyucu Aile": 10,
      Diğer: 99
    }[tur] || 99;
  }

</script>
</body>
